set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

map $pr_number $pr_frontend_port {
    ~^[1-9]$          1500$pr_number;
    ~^[1-9][0-9]$    150$pr_number;
    ~^[1-9][0-9]{2}$ 15$pr_number;
    default           0;
}

map $pr_number $pr_backend_port {
    ~^[1-9]$          1600$pr_number;
    ~^[1-9][0-9]$    160$pr_number;
    ~^[1-9][0-9]{2}$ 16$pr_number;
    default           0;
}

server {
    listen 8080;
    server_name _;
    client_max_body_size 512k;

    location ~ ^/pr-([1-9][0-9]{0,2})/api/v2/(.*)$ {
        set $pr_number $1;
        set $api_path $2;
        proxy_pass http://127.0.0.1:$pr_backend_port/api/v2/$api_path$is_args$args;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Pr-Number $pr_number;
    }

    location ~ ^/pr-([1-9][0-9]{0,2})/(.*)$ {
        set $pr_number $1;
        set $asset_path $2;
        proxy_pass http://127.0.0.1:$pr_frontend_port/$asset_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/pr-([1-9][0-9]{0,2})/?$ {
        set $pr_number $1;
        proxy_pass http://127.0.0.1:$pr_frontend_port/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /preview-health {
        add_header Content-Type text/plain;
        return 200 "preview-proxy ok\n";
    }

    location / {
        proxy_pass http://127.0.0.1:15000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
