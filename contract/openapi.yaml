    ModActionPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/ModAction" } } } }

    # ---- forum: DM ----
    DmConversation:
      type: object
      required: [id, participantId, participantHandle, unreadCount, isArchived, isMuted, isDeleted, requestStatus, canSend, createdAt]
      properties:
        id: { type: string }
        participantId: { type: string }
        participantHandle: { type: string }
        participantAvatarUrl: { type: string, nullable: true }
        lastMessageExcerpt: { type: string, nullable: true }
        lastMessageAt: { type: integer, nullable: true }
        unreadCount: { type: integer, minimum: 0 }
        isArchived: { type: boolean }
        isMuted: { type: boolean }
        isDeleted: { type: boolean }
        requestStatus: { type: string, enum: [accepted, pending] }
        requestDirection: { type: string, enum: [incoming, outgoing], nullable: true }
        canSend: { type: boolean, description: False while a one-message request awaits acceptance. }
        createdAt: { type: integer }
    DmConversationInput:
      type: object
      required: [recipientHandle]
      properties:
        recipientHandle: { type: string, minLength: 3, maxLength: 30 }
        requestMessage:
          type: string
          minLength: 1
          maxLength: 1000
          description: Required when the recipient does not already accept direct delivery from the sender; it is the only message allowed before acceptance.
    DmCounts:
      type: object
      required: [count, unreadCount, requestCount]
      properties:
        count: { type: integer, minimum: 0, description: unreadCount plus requestCount for compatibility badges. }
        unreadCount: { type: integer, minimum: 0 }
        requestCount: { type: integer, minimum: 0 }
    DmMessage:
      type: object
      required: [id, conversationId, senderId, senderHandle, body, createdAt]
      properties:
        id: { type: string }
        conversationId: { type: string }
        senderId: { type: string }
        senderHandle: { type: string }
        body: { type: string }
        createdAt: { type: integer }
    DmMessageInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 16000 }
    DmReadInput:
      type: object
      properties:
        lastReadMessageId: { type: string, nullable: true }
    DmReportInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, enum: [spam, abuse, harassment, fraud, illegal, other] }
        note: { type: string, maxLength: 1000 }
    DmReport:
      type: object
      required: [id, messageId, conversationId, reporterId, senderId, reason, status, createdAt]
      properties:
        id: { type: string }
        messageId: { type: string }
        conversationId: { type: string }
        reporterId: { type: string }
        reporterHandle: { type: string }
        senderId: { type: string }
        senderHandle: { type: string }
        messageExcerpt: { type: string }
        reason: { type: string, enum: [spam, abuse, harassment, fraud, illegal, other] }
        note: { type: string, nullable: true }
        status: { type: string, enum: [open, upheld, rejected] }
        handledBy: { type: string, nullable: true }
        handledAt: { type: integer, nullable: true }
        createdAt: { type: integer }
    DmReportResolutionInput:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [uphold, reject] }
        note: { type: string, maxLength: 1000 }
    # ---- forum: polls ----
    PollInput:
      type: object
      required: [question, options]
      properties:
        question: { type: string, minLength: 1, maxLength: 500 }
        multiSelect: { type: boolean, default: false }
        closesAt: { type: integer, nullable: true }
        options:
          type: array
          minItems: 2
          maxItems: 20
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 200 }
    PollOption:
      type: object
      required: [id, label, voteCount, position]
      properties:
        id: { type: string }
        label: { type: string }
        voteCount: { type: integer, minimum: 0 }
        position: { type: integer, minimum: 0 }
    Poll:
      type: object
      required: [id, question, multiSelect, closesAt, options, myVotes]
      properties:
        id: { type: string }
        question: { type: string }
        multiSelect: { type: boolean }
        closesAt: { type: integer, nullable: true }
        options:
          type: array
          items: { $ref: "#/components/schemas/PollOption" }
        myVotes: { type: array, items: { type: string } }
    PollVoteResponse:
      type: object
      required: [ok, myVotes]
      properties:
        ok: { type: boolean }
        myVotes: { type: array, items: { type: string } }
    # ---- forum: cross-device drafts ----
    ThreadDraftPayload:
      type: object
      additionalProperties: false
      required: [kind, boardId, title, body, contentFormat, tags, pollQuestion, pollOptions, attachmentAssetIds]
      properties:
        kind: { type: string, enum: [thread] }
        boardId: { type: string, nullable: true }
        title: { type: string, maxLength: 120 }
        body: { type: string, maxLength: 50000 }
        contentFormat: { $ref: "#/components/schemas/ContentFormat" }
        tags:
          type: array
          maxItems: 3
          items: { type: string, minLength: 1, maxLength: 32 }
        pollQuestion: { type: string, maxLength: 300 }
        pollOptions:
          type: array
          maxItems: 20
          items: { type: string, maxLength: 200 }
        attachmentAssetIds:
          type: array
          maxItems: 8
          uniqueItems: true
          description: Owner-only upload ids retained across devices. Pending/blocked state is not public binding authorization.
          items: { type: string, pattern: '^[1-9][0-9]*$' }
    CommentDraftPayload:
      type: object
      additionalProperties: false
      required: [kind, threadId, body, contentFormat, parentId, attachmentAssetIds]
      properties:
        kind: { type: string, enum: [comment] }
        threadId: { type: string }
        body: { type: string, maxLength: 16000 }
        contentFormat: { $ref: "#/components/schemas/ContentFormat" }
        parentId: { type: string, nullable: true }
        attachmentAssetIds:
          type: array
          maxItems: 4
          uniqueItems: true
          description: Owner-only upload ids retained across devices. Pending/blocked state is not public binding authorization.
          items: { type: string, pattern: '^[1-9][0-9]*$' }
    ForumDraftPayload:
      oneOf:
        - { $ref: "#/components/schemas/ThreadDraftPayload" }
        - { $ref: "#/components/schemas/CommentDraftPayload" }
      discriminator:
        propertyName: kind
        mapping:
          thread: "#/components/schemas/ThreadDraftPayload"
          comment: "#/components/schemas/CommentDraftPayload"
    DraftOutput:
      type: object
      required: [draftKey, payload, version, updatedAt]
      properties:
        draftKey: { type: string }
        payload: { $ref: "#/components/schemas/ForumDraftPayload" }
        version: { type: integer, minimum: 1 }
        updatedAt: { type: integer, format: int64 }
    DraftSaveInput:
      type: object
      additionalProperties: false
      required: [draftKey, expectedVersion, payload]
      properties:
        draftKey: { type: string }
        expectedVersion:
          type: integer
          minimum: 0
          description: Zero creates a new draft; a positive value compare-and-swaps that version.
        payload: { $ref: "#/components/schemas/ForumDraftPayload" }
    # ---- social identity ----
    IgnoreUser:
      type: object
      deprecated: true
      properties:
        accountId: { type: string }
        handle: { type: string }
        avatarUrl: { type: string, nullable: true }
        createdAt: { type: integer }
    UserSummary:
      type: object
      required: [id, handle, displayName, avatarUrl, role, followedAt]
      properties:
        id: { type: string }
        handle: { type: string }
        displayName: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, mod, admin] }
        followedAt: { type: integer }
    UserRelationship:
      type: object
      required: [isSelf, following, followedBy, muted, blockedByMe, blockedMe, canFollow, canStartConversation, canMention]
      properties:
        isSelf: { type: boolean }
        following: { type: boolean }
        followedBy: { type: boolean }
        muted: { type: boolean }
        blockedByMe: { type: boolean }
        blockedMe: { type: boolean }
        canFollow: { type: boolean }
        canStartConversation:
          type: boolean
          description: Whether the current account may start a new conversation under block and recipient DM policy.
        canMention:
          type: boolean
          description: Whether the current account may create a semantic mention notification under block and recipient mention policy.
    # ---- public profile ----
    UserBadge:
      type: object
      required: [slug, name]
      properties:
        slug: { type: string }
        name: { type: string }
    VerificationCategory:
      type: string
      enum: [identity, special]
    VerificationIcon:
      type: string
      description: Controlled icon token rendered with the first-party icon library.
      enum: [badge-check, building-2, shield-check, sparkles]
    VerificationBadgeVariant:
      type: string
      description: Controlled semantic badge variant; arbitrary CSS and colors are not accepted.
      enum: [default, secondary, outline]
    PublicVerification:
      type: object
      required: [slug, category, label, icon, badgeVariant, issuedAt]
      properties:
        slug: { type: string }
        category: { $ref: "#/components/schemas/VerificationCategory" }
        label: { type: string }
        description: { type: string, nullable: true }
        icon: { $ref: "#/components/schemas/VerificationIcon" }
        badgeVariant: { $ref: "#/components/schemas/VerificationBadgeVariant" }
        issuedAt: { type: integer }
        expiresAt: { type: integer, nullable: true }
    UserProfile:
      type: object
      required: [id, handle, displayName, bio, website, avatarUrl, bannerUrl, role, trustLevel, badges, verifications, threadCount, commentCount, votesReceived, followerCount, followingCount, canViewActivity, createdAt]
      properties:
        id: { type: string }
        handle: { type: string }
        displayName: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        website: { type: string, format: uri, nullable: true }
        avatarUrl: { type: string, nullable: true }
        bannerUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, mod, admin] }
        trustLevel: { type: integer, minimum: 0 }
        badges: { type: array, items: { $ref: "#/components/schemas/UserBadge" } }
        verifications:
          type: array
          description: Active grants explicitly allowed for public profile display; never contains evidence, issuer, or staff reason.
          items: { $ref: "#/components/schemas/PublicVerification" }
        threadCount: { type: integer, minimum: 0 }
        commentCount: { type: integer, minimum: 0 }
        votesReceived: { type: integer, minimum: 0 }
        followerCount: { type: integer, minimum: 0 }
        followingCount: { type: integer, minimum: 0 }
        canViewActivity:
          type: boolean
          description: Viewer-specific permission for authored-content lists and future activity, media, and likes tabs. Aggregate public-content counters remain visible with the profile.
        createdAt: { type: integer }
    UserThread:
      type: object
      required: [id, title, boardSlug, replyCount, voteCount, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        boardSlug: { type: string }
        replyCount: { type: integer, minimum: 0 }
        voteCount: { type: integer }
        createdAt: { type: integer }
    UserComment:
      type: object
      required: [id, threadId, threadTitle, body, contentFormat, createdAt]
      properties:
        id: { type: string }
        threadId: { type: string }
        threadTitle: { type: string }
        body: { type: string }
        contentFormat: { $ref: "#/components/schemas/ContentFormat" }
        createdAt: { type: integer }
    UserProfileWithStats:
      allOf: [{ $ref: "#/components/schemas/UserProfile" }]
      deprecated: true
    # ---- activity ----
    ActivityWeights:
      type: object
      required: [thread, comment, like]
      properties:
        thread: { type: integer, minimum: 0, maximum: 1000 }
        comment: { type: integer, minimum: 0, maximum: 1000 }
        like: { type: integer, minimum: 0, maximum: 1000 }
    ActivityDay:
      type: object
      required: [date, threads, comments, likes, score]
      properties:
        date: { type: string, format: date }
        threads: { type: integer, minimum: 0 }
        comments: { type: integer, minimum: 0 }
        likes: { type: integer, minimum: 0, description: Positive likes given by the user. }
        score: { type: integer, minimum: 0 }
    ActivityCalendar:
      type: object
      description: A continuous Asia/Shanghai calendar; days without activity are returned with zero counts.
      required: [timezone, from, to, policyVersion, weights, days]
      properties:
        timezone: { type: string, enum: [Asia/Shanghai] }
        from: { type: string, format: date }
        to: { type: string, format: date }
        policyVersion: { type: integer, minimum: 1 }
        weights: { $ref: "#/components/schemas/ActivityWeights" }
        days: { type: array, items: { $ref: "#/components/schemas/ActivityDay" } }
    ActivityPolicy:
      type: object
      required: [version, timezone, weights, reason, changedBy, createdAt]
      properties:
        version: { type: integer, minimum: 1 }
        timezone: { type: string, enum: [Asia/Shanghai] }
        weights: { $ref: "#/components/schemas/ActivityWeights" }
        reason: { type: string }
        changedBy: { type: string }
        createdAt: { type: integer }
    ActivityPolicyUpdateInput:
      type: object
      required: [expectedVersion, weights, reason]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        weights: { $ref: "#/components/schemas/ActivityWeights" }
        reason: { type: string, minLength: 3, maxLength: 500 }
    # ---- platform ----
    OneboxResult:
      type: object
      properties:
        url: { type: string }
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image: { type: string, nullable: true }
        siteName: { type: string, nullable: true }
    # ---- media ----
    MediaUsage:
      type: string
      description: Optional intended image surface persisted across moderation and page reloads; it is not a business binding.
      enum: [profile_avatar, profile_banner, forum_thread, forum_comment]
    UploadIntentInput:
      type: object
      required: [kind, contentType]
      properties:
        kind: { type: string, enum: [image, file] }
        contentType: { type: string }
        usage:
          allOf: [{ $ref: "#/components/schemas/MediaUsage" }]
          description: Controlled usages require kind=image. Omit for unbound generic uploads.
    UploadCredentials:
      type: object
      required: [uploadIntentId, accessKeyId, accessKeySecret, securityToken, region, bucket, prefix, ossKey, callbackUrl, callbackBody, expiration]
      properties:
        uploadIntentId: { type: string, format: uuid }
        accessKeyId: { type: string }
        accessKeySecret: { type: string }
        securityToken: { type: string }
        region: { type: string }
        bucket: { type: string }
        prefix: { type: string }
        ossKey: { type: string }
        callbackUrl: { type: string, format: uri }
        callbackBody: { type: string }
        expiration: { type: integer, description: Unix seconds }
    Upload:
      type: object
      required: [id, accountId, kind, bytes, mime, status, usage, imageWidth, imageHeight, approvalRequirement, deletionState, createdAt]
      description: Moderation-safe metadata. Storage key, object URL, and content hash are deliberately omitted.
      properties:
        id: { type: string }
        accountId: { type: string }
        kind: { type: string, enum: [image, file] }
        bytes: { type: integer }
        mime: { type: string }
        status: { type: string, enum: [pending, clean, quarantined, blocked] }
        usage:
          allOf: [{ $ref: "#/components/schemas/MediaUsage" }]
          nullable: true
        imageWidth: { type: integer, minimum: 1, maximum: 20000, nullable: true }
        imageHeight: { type: integer, minimum: 1, maximum: 20000, nullable: true }
        approvalRequirement:
          type: string
          enum: [none, image_preview, scanner, satisfied]
          description: Actor-specific evidence gate. Files remain scanner-gated; image approval requires this moderator's trusted preview.
        deletionState:
          type: string
          enum: [queued, leased, succeeded, dead_letter]
          nullable: true
          description: Durable provider deletion state, present after an upload enters quarantine.
        createdAt: { type: integer }
    MyUpload:
      type: object
      required: [id, kind, usage, bytes, mime, status, imageWidth, imageHeight, createdAt]
      description: Owner-safe upload status; storage keys, hashes, and object URLs are intentionally omitted.
      properties:
        id: { type: string }
        kind: { type: string, enum: [image, file] }
        usage:
          allOf: [{ $ref: "#/components/schemas/MediaUsage" }]
          nullable: true
        bytes: { type: integer, minimum: 1 }
        mime: { type: string }
        status: { type: string, enum: [pending, clean, quarantined, blocked] }
        imageWidth: { type: integer, minimum: 1, maximum: 20000, nullable: true }
        imageHeight: { type: integer, minimum: 1, maximum: 20000, nullable: true }
        createdAt: { type: integer }
    ModerationPreviewGrant:
      type: object
      description: One-time short-lived credential for a same-origin, audited media preview. Contains no provider URL, key, or content hash.
      required: [token, expiresAt]
      properties:
        token: { type: string, minLength: 43, maxLength: 43 }
        expiresAt: { type: integer, description: Unix seconds; grants expire after 60 seconds and are consumed once. }
    UploadUrl:
      type: object
      required: [url]
      properties:
        url: { type: string }
    UploadPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Upload" } } } }
    MyUploadPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/MyUpload" } } } }
    AdminForumFlagPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AdminForumFlag" } } } }

    # ---- admin ----
    AdminUser:
      type: object
      required: [id, handle, role, status, trustLevel, createdAt]
      properties:
        id: { type: string }
        handle: { type: string }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, mod, admin] }
        status: { type: string, enum: [active, suspended, deleted] }
        trustLevel: { type: integer, minimum: 0 }
        lastActiveAt: { type: integer, nullable: true }
        createdAt: { type: integer }
    AdminUserInviteInput:
      type: object
      required: [email, handle, reason]
      properties:
        email: { type: string, format: email }
        handle: { type: string, minLength: 3, maxLength: 30 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminReasonInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminForumFlag:
      type: object
      required: [id, targetType, targetId, reporterId, reason, weight, status, createdAt]
      properties:
        id: { type: string }
        targetType: { type: string, enum: [thread, comment] }
        targetId: { type: string }
        reporterId: { type: string }
        reason: { type: string, enum: [spam, abuse, off_topic, illegal, other] }
        note: { type: string, nullable: true }
        weight: { type: number }
        status: { type: string, enum: [open, upheld, rejected, ignored] }
        handledBy: { type: string, nullable: true }
        handledAt: { type: integer, nullable: true }
        resolutionNote: { type: string, nullable: true }
        authorHandle: { type: string, nullable: true }
        targetTitle: { type: string, nullable: true }
        contentExcerpt: { type: string, nullable: true }
        createdAt: { type: integer }
    AdminUserRoleInput:
      type: object
      required: [role, reason]
      properties:
        role: { type: string, enum: [user, mod] }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminOverview:
      type: object
      required: [totalUsers, activeUsers, suspendedUsers, pendingReviewReports, pendingForumFlags, pendingDmReports, pendingMediaUploads, threadsToday, commentsToday, likesToday]
      properties:
        totalUsers: { type: integer, minimum: 0 }
        activeUsers: { type: integer, minimum: 0 }
        suspendedUsers: { type: integer, minimum: 0 }
        moderators: { type: integer, minimum: 0 }
        administrators: { type: integer, minimum: 0 }
        pendingReviewReports: { type: integer, minimum: 0 }
        pendingForumFlags: { type: integer, minimum: 0 }
        pendingDmReports: { type: integer, minimum: 0 }
        pendingMediaUploads: { type: integer, minimum: 0 }
        threadsToday: { type: integer, minimum: 0 }
        commentsToday: { type: integer, minimum: 0 }
        likesToday: { type: integer, minimum: 0 }
    AdminAuditEvent:
      type: object
      required: [id, actorKind, action, targetType, targetId, createdAt]
      properties:
        id: { type: string }
        actorKind: { type: string, enum: [account, system, service] }
        actorId: { type: string, nullable: true }
        actorHandle: { type: string, nullable: true }
        actorRole: { type: string, nullable: true }
        action: { type: string }
        targetType: { type: string }
        targetId: { type: string }
        reason: { type: string, nullable: true }
        metadata: { type: object, nullable: true }
        createdAt: { type: integer }
    NotificationOutboxEvent:
      type: object
      additionalProperties: false
      required: [id, topic, recipientAccountId, eventType, state, attempts, maxAttempts, manualRetryCount, availableAt, createdAt, updatedAt]
      description: Operational metadata for a durable notification side effect. The private payload and source key are never exposed.
      properties:
        id: { type: string }
        topic: { type: string, enum: [notification, achievement_award] }
        recipientAccountId: { type: string }
        eventType: { type: string }
        state: { type: string, enum: [queued, running, succeeded, dead, cancelled] }
        attempts: { type: integer, minimum: 0 }
        maxAttempts: { type: integer, minimum: 1 }
        manualRetryCount: { type: integer, minimum: 0 }
        availableAt: { type: integer }
        lastErrorCode: { type: string, nullable: true }
        completedAt: { type: integer, nullable: true }
        deadAt: { type: integer, nullable: true }
        createdAt: { type: integer }
        updatedAt: { type: integer }
    NotificationOutboxRetryInput:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
    AchievementIcon:
      type: string
      enum: [award, book-open-check, message-circle-heart, star]
    AchievementStatus:
      type: string
      enum: [active, retired]
    Achievement:
      type: object
      required: [id, slug, name, description, icon, status, mintAmount, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        icon: { $ref: "#/components/schemas/AchievementIcon" }
        status: { $ref: "#/components/schemas/AchievementStatus" }
        mintAmount: { type: integer, minimum: 0 }
        version: { type: integer, minimum: 1 }
        createdAt: { type: integer }
        updatedAt: { type: integer }
    AchievementCreateInput:
      type: object
      additionalProperties: false
      required: [slug, name, icon, mintAmount, reason]
      properties:
        slug: { type: string, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$", maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 240, nullable: true }
        icon: { $ref: "#/components/schemas/AchievementIcon" }
        mintAmount: { type: integer, minimum: 0, maximum: 100000 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AchievementUpdateInput:
      type: object
      additionalProperties: false
      required: [expectedVersion, name, icon, status, mintAmount, reason]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 240, nullable: true }
        icon: { $ref: "#/components/schemas/AchievementIcon" }
        status: { $ref: "#/components/schemas/AchievementStatus" }
        mintAmount: { type: integer, minimum: 0, maximum: 100000 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AchievementGrant:
      type: object
      required: [accountId, achievementId, slug, name, icon, definitionStatus, status, awardReason, awardedAt, awardedBy, revokedAt, revokedBy, revokeReason]
      properties:
        accountId: { type: string }
        achievementId: { type: string }
        slug: { type: string }
        name: { type: string }
        icon: { $ref: "#/components/schemas/AchievementIcon" }
        definitionStatus: { $ref: "#/components/schemas/AchievementStatus" }
        status: { type: string, enum: [active, revoked] }
        awardReason: { type: string, nullable: true }
        awardedAt: { type: integer }
        awardedBy: { type: string }
        revokedAt: { type: integer, nullable: true }
        revokedBy: { type: string, nullable: true }
        revokeReason: { type: string, nullable: true }
    AchievementGrantInput:
      type: object
      additionalProperties: false
      required: [achievementId, reason]
      properties:
        achievementId: { type: string }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AchievementRevokeInput:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
    AchievementEvent:
      type: object
      required: [id, achievementId, slug, name, action, source, actorId, reason, createdAt]
      properties:
        id: { type: string }
        achievementId: { type: string }
        slug: { type: string }
        name: { type: string }
        action: { type: string, enum: [awarded, revoked] }
        source: { type: string, enum: [automatic, manual] }
        actorId: { type: string, nullable: true }
        reason: { type: string }
        createdAt: { type: integer }
    VerificationType:
      type: object
      required: [id, slug, category, label, icon, badgeVariant, allowsPublicDisplay, createdAt]
      properties:
        id: { type: string }
        slug: { type: string }
        category: { $ref: "#/components/schemas/VerificationCategory" }
        label: { type: string }
        description: { type: string, nullable: true }
        icon: { $ref: "#/components/schemas/VerificationIcon" }
        badgeVariant: { $ref: "#/components/schemas/VerificationBadgeVariant" }
        allowsPublicDisplay: { type: boolean }
        createdAt: { type: integer }
    VerificationTypeInput:
      type: object
      required: [slug, category, label, icon, badgeVariant, allowsPublicDisplay, reason]
      additionalProperties: false
      properties:
        slug: { type: string, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$', minLength: 1, maxLength: 64 }
        category: { $ref: "#/components/schemas/VerificationCategory" }
        label: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, nullable: true, maxLength: 240 }
        icon: { $ref: "#/components/schemas/VerificationIcon" }
        badgeVariant: { $ref: "#/components/schemas/VerificationBadgeVariant" }
        allowsPublicDisplay: { type: boolean, default: false }
        reason: { type: string, minLength: 3, maxLength: 500 }
    VerificationGrant:
      type: object
      required: [id, accountId, verificationTypeId, slug, category, label, icon, badgeVariant, displayOnProfile, status, issuedBy, issuedAt, issueReason, hasEvidence]
      properties:
        id: { type: string }
        accountId: { type: string }
        verificationTypeId: { type: string }
        slug: { type: string }
        category: { $ref: "#/components/schemas/VerificationCategory" }
        label: { type: string }
        icon: { $ref: "#/components/schemas/VerificationIcon" }
        badgeVariant: { $ref: "#/components/schemas/VerificationBadgeVariant" }
        displayOnProfile: { type: boolean }
        status: { type: string, enum: [active, expired, revoked] }
        issuedBy: { type: string, nullable: true }
        issuedAt: { type: integer }
        expiresAt: { type: integer, nullable: true }
        issueReason: { type: string }
        hasEvidence: { type: boolean }
        revokedBy: { type: string, nullable: true }
        revokedAt: { type: integer, nullable: true }
        revokeReason: { type: string, nullable: true }
    VerificationGrantInput:
      type: object
      required: [verificationTypeId, displayOnProfile, reason]
      additionalProperties: false
      properties:
        verificationTypeId: { type: string }
        displayOnProfile: { type: boolean, default: false }
        expiresAt: { type: integer, nullable: true }
        evidenceReference:
          type: string
          nullable: true
          maxLength: 128
          description: Private opaque pointer to separately governed evidence; never returned by public or staff list responses.
        reason: { type: string, minLength: 3, maxLength: 500 }
    VerificationRevokeInput:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
    FeatureThreadInput:
      type: object
      required: [featured, reason]
      properties:
        featured: { type: boolean }
        reason: { type: string, minLength: 3, maxLength: 500 }
    FeaturedThreadResponse:
      type: object
      properties:
        id: { type: string }
        featuredAt: { type: integer }
    # ---- typed pages (cont.) ----
    DmConversationPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DmConversation" } } } }
    DmMessagePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DmMessage" } } } }
    DraftPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DraftOutput" } } } }
    IgnorePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/IgnoreUser" } } } }
    AchievementPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Achievement" } } } }
    AchievementEventPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AchievementEvent" } } } }
    AchievementGrantPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AchievementGrant" } } } }
    VerificationTypePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/VerificationType" } } } }
    VerificationGrantPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/VerificationGrant" } } } }
    ActivityPolicyPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/ActivityPolicy" } } } }
    AdminUserPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AdminUser" } } } }
    AdminAuditEventPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AdminAuditEvent" } } } }
    NotificationOutboxEventPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/NotificationOutboxEvent" } } } }
    DmReportPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DmReport" } } } }
    AnnouncementPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Announcement" } } } }
    AnnouncementRevisionPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AnnouncementRevision" } } } }
    PromotionPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Promotion" } } } }

paths:
  # ============ auth & identity ============
  /auth/email/request-code:
    post:
      tags: [auth]
      security: []
      summary: Send a verification code to a @tongji.edu.cn address
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/EmailCodeRequest" } } }
      responses:
        "204": { description: sent }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /auth/email/verify:
    post:
      tags: [auth]
      security: []
      summary: Verify a code and log in / register
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/EmailCodeVerification" } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthTokens" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
  /auth/appeal/email/verify:
    post:
      tags: [auth]
      security: []
      summary: Exchange an appeal-purpose email code for an appeal-only credential
      description: Suspended accounts may use this credential only for their own appeal cases and governance notices.
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AppealEmailVerification" } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AppealAccessToken" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/appeal/password:
    post:
      tags: [auth]
      security: []
      summary: Verify campus email and password for appeal-only access
      description: Returns no refresh token and does not authorize any non-appeal route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password, minLength: 1, maxLength: 128 }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AppealAccessToken" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/refresh:
    post:
      tags: [auth]
      security: []
      summary: Exchange a refresh token for new tokens
      description: Rotates the token exactly once. Reuse of a consumed token revokes its session family.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RefreshInput" } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthTokens" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current device session family
      responses: { "204": { description: ok }, "401": { $ref: "#/components/responses/Unauthorized" } }
  /auth/logout-all:
    post:
      tags: [auth]
      summary: Revoke every session for the current account
      responses: { "204": { description: all sessions revoked }, "401": { $ref: "#/components/responses/Unauthorized" } }
  /auth/recent-auth:
    get:
      tags: [auth, identity]
      summary: Get current session recent-auth status
      description: Reads only the active server-side session timestamp; JWT iat is never accepted as freshness.
      responses:
        "200": { description: status, content: { application/json: { schema: { $ref: "#/components/schemas/RecentAuthStatus" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/recent-auth/email/request-code:
    post:
      tags: [auth, identity]
      summary: Send a purpose-bound step-up code to the authenticated account
      description: The server resolves the current account's campus email; no email identifier is accepted or returned.
      responses:
        "204": { description: provider accepted the message }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "428": { $ref: "#/components/responses/RecentAuthRequired" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /auth/recent-auth/verify:
    post:
      tags: [auth, identity]
      summary: Refresh recent authentication for the current revocable session
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RecentAuthVerifyInput" } } }
      responses:
        "200": { description: fresh status, content: { application/json: { schema: { $ref: "#/components/schemas/RecentAuthStatus" } } } }
