    post:
      tags: [forum]
      summary: Report a private message to moderators
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/DmReportInput" } } } }
      responses: { "202": { description: queued }, "404": { $ref: "#/components/responses/NotFound" }, "409": { $ref: "#/components/responses/Conflict" } }
  /forum/polls/{id}/vote:
    post:
      tags: [forum]
      summary: Vote on a poll option
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [optionId], properties: { optionId: { type: string } } } } } }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/PollVoteResponse" } } } }, "409": { $ref: "#/components/responses/Conflict" } }
    delete:
      tags: [forum]
      summary: Remove the current account's vote for one poll option
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: optionId, in: query, required: true, schema: { type: string } }
      responses: { "200": { description: removed or already absent, content: { application/json: { schema: { $ref: "#/components/schemas/PollVoteResponse" } } } }, "409": { $ref: "#/components/responses/Conflict" } }
  /forum/polls/{id}/results:
    get:
      tags: [forum]
      security: [{}, { bearer: [] }]
      summary: Get poll results
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Poll" } } } } }

  # ============ media ==========
  /media/upload-credentials:
    post:
      tags: [media]
      summary: Issue an OSS upload intent and scoped STS credentials
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UploadIntentInput" } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/UploadCredentials" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /media/callback:
    post:
      tags: [media]
      security: []
      summary: Alibaba OSS signed upload callback
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: ok }
        "400": { $ref: "#/components/responses/BadRequest" }
  /media/{id}/url:
    get:
      tags: [media]
      summary: Get CDN/object URL for an uploaded object
      description: Pending objects are owner-only; staff review must use the audited same-origin preview grant flow. Blocked objects are never returned.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/UploadUrl" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /me/media/uploads:
    get:
      tags: [media]
      summary: List the current account's recent uploads for review-status recovery
      parameters:
        - name: usage
          in: query
          schema: { $ref: "#/components/schemas/MediaUsage" }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/MyUploadPage" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /me/media/uploads/{id}:
    get:
      tags: [media]
      summary: Poll one owned upload's moderation status
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/MyUpload" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /me/profile/avatar:
    put:
      tags: [media]
      summary: Bind an owned clean OSS image as the current account's avatar
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ProfileAssetInput" } } } }
      responses:
        "204": { description: bound }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [media]
      summary: Remove the current account's avatar binding
      responses: { "204": { description: removed }, "401": { $ref: "#/components/responses/Unauthorized" } }
  /me/profile/banner:
    put:
      tags: [media]
      summary: Bind an owned clean OSS image as the current account's profile banner
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ProfileAssetInput" } } } }
      responses:
        "204": { description: bound }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [media]
      summary: Remove the current account's profile banner binding
      responses: { "204": { description: removed }, "401": { $ref: "#/components/responses/Unauthorized" } }

  # ============ governance appeals and notices ============
  /me/appeals:
    get:
      tags: [identity, admin]
      summary: List my appeal cases and immutable status history
      description: Accepts either a normal account bearer or a short-lived appeal-only bearer.
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AppealPage" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [identity, admin]
      summary: Submit an appeal for my own active governance disposition
      description: One case per original event. The original action must be within 30 days and still active.
      parameters: [{ $ref: "#/components/parameters/AppealIdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SubmitAppealInput" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Appeal" } } } }
        "200": { description: idempotent replay, content: { application/json: { schema: { $ref: "#/components/schemas/Appeal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /me/appeals/{id}/withdraw:
    post:
      tags: [identity, admin]
      summary: Withdraw my unclaimed appeal without erasing history
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AppealTransitionInput" } } } }
      responses:
        "200": { description: withdrawn, content: { application/json: { schema: { $ref: "#/components/schemas/Appeal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /me/governance-notices:
    get:
      tags: [notifications]
      summary: List mandatory account-private governance notices
      description: Notices contain no staff identity, reporter identity, or private evidence.
      parameters:
        - { name: unread, in: query, schema: { type: boolean, default: false } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/GovernanceNoticePage" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /me/governance-notices/unread-count:
    get:
      tags: [notifications]
      summary: Count unread mandatory governance notices
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: object, required: [count], properties: { count: { type: integer, minimum: 0 } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /me/governance-notices/read:
    post:
      tags: [notifications]
      summary: Mark selected or all governance notices read
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/GovernanceNoticeReadInput" } } } }
      responses:
        "204": { description: marked }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ============ notifications ============
  /notifications:
    get:
      tags: [notifications]
      summary: My notifications
      parameters: [{ name: unread, in: query, schema: { type: boolean } }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationPage" } } } } }
  /notifications/read:
    post:
      tags: [notifications]
      summary: Mark notifications read
      description: >-
        Send ids to mark selected notifications or all=true to mark every notification. For rolling
        compatibility, an empty object still means mark all; new clients must send all=true explicitly.
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/NotificationReadInput" } }
      responses:
        "204": { description: marked }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /notifications/unread-count:
    get: { tags: [notifications], summary: Unread notification count, responses: { "200": { description: ok, content: { application/json: { schema: { type: object, properties: { count: { type: integer } } } } } } } }
  /notifications/stream:
    get:
      tags: [notifications]
      summary: SSE stream for real-time notifications
      description: >-
        Best-effort refresh hints only. The stream emits sync immediately after every connection;
        clients must refetch durable notification and unread-count endpoints after sync or any event.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: { schema: { type: string } }
  /me/notification-prefs:
    get: { tags: [notifications], summary: Get notification preferences, responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationPrefs" } } } } } }
    put: { tags: [notifications], summary: Update notification preferences, requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationPrefsInput" } } } }, responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationPrefs" } } } } } }

  # ============ platform ============
  /startup/verify:
    post:
      tags: [platform]
      security: []
      summary: Captcha gate (Turnstile / TongjiCaptcha)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [token], properties: { token: { type: string } } } } } }
      responses:
        "200": { description: ok }
        "400": { $ref: "#/components/responses/BadRequest" }
  /announcements:
    get:
      tags: [platform]
      security: [{ bearer: [] }, {}]
      summary: Active announcements applicable to the current viewer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Announcement" }
  /announcements/unread:
    get:
      tags: [platform]
      summary: Active current announcement revisions not yet seen by the current account
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Announcement" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /announcements/{id}/receipt:
    post:
      tags: [platform]
      summary: Record seen, dismissed, or acknowledged state for the current revision
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AnnouncementReceiptInput" } } } }
      responses:
        "200": { description: recorded, content: { application/json: { schema: { $ref: "#/components/schemas/AnnouncementReceipt" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /promotions:
    get:
      tags: [platform]
      security: [{ bearer: [] }, {}]
      summary: Active first-party promotions applicable to the current viewer
      parameters:
        - { name: placement, in: query, schema: { type: string, enum: [home-left-primary, home-left-secondary] } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Promotion" }
  /promotions/{id}/events:
    post:
      tags: [platform]
      security: []
      summary: Record one deduplicated anonymous promotion impression or click
      description: A click implicitly records the matching impression when it was not delivered first. The signed presentation token contains no account, IP, or device identifier.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PromotionEventInput" } } } }
      responses:
        "204": { description: recorded or already recorded }
        "400": { $ref: "#/components/responses/BadRequest" }
  /settings:
    get: { tags: [platform], security: [], summary: Public runtime settings, responses: { "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Setting" } } } } } } }
  /onebox:
    get:
      tags: [platform]
      security: []
      summary: Onebox URL preview
      parameters: [{ name: url, in: query, required: true, schema: { type: string } }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OneboxResult" } } } } }

  # ============ admin (role: mod/admin) ============
  /admin/overview:
    get:
      tags: [admin]
      summary: Administration dashboard counters
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AdminOverview" } } } }, "403": { $ref: "#/components/responses/Forbidden" } }
  /admin/audit-events:
    get:
      tags: [admin]
      summary: Cursor-paginated immutable administration audit events
      parameters:
        - { name: actorId, in: query, schema: { type: string } }
        - { name: action, in: query, schema: { type: string } }
        - { name: targetType, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AdminAuditEventPage" } } } }, "403": { $ref: "#/components/responses/Forbidden" } }
  /admin/notification-outbox:
    get:
      tags: [admin, notifications]
      summary: List durable notification outbox operations by state
      description: Requires operations.jobs. Payloads and source keys are intentionally excluded.
      parameters:
        - { name: state, in: query, schema: { type: string, enum: [queued, running, succeeded, dead, cancelled], default: dead } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationOutboxEventPage" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /admin/notification-outbox/{id}/retry:
    post:
      tags: [admin, notifications]
      summary: Retry one dead-letter notification operation
      description: Requires operations.jobs. The reason and retry metadata are written to the immutable admin audit log.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationOutboxRetryInput" } } } }
      responses:
        "200": { description: queued, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationOutboxEvent" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /admin/appeals:
    get:
      tags: [admin]
      summary: List lower-role appeal cases visible to an independent reviewer
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/AppealStatus" } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AdminAppealPage" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /admin/appeals/{id}/review:
    post:
      tags: [admin]
      summary: Claim a submitted appeal for independent review
      description: The reviewer must outrank the appellant and cannot be the original disposition actor.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AppealTransitionInput" } } } }
      responses:
        "200": { description: in review, content: { application/json: { schema: { $ref: "#/components/schemas/AdminAppeal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /admin/appeals/{id}/decision:
    post:
      tags: [admin]
      summary: Decide an assigned appeal and atomically apply any owner-domain reversal
      description: Content targets support upheld/overturned. Sanctions additionally support a shortening amendment; unsupported adjustments fail closed.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AppealDecisionInput" } } } }
      responses:
        "200": { description: decided, content: { application/json: { schema: { $ref: "#/components/schemas/AdminAppeal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /admin/credit/reconciliations:
    get:
      tags: [admin, credit]
      summary: List persistent read-only credit reconciliation runs
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/CreditReconciliationRunPage" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin, credit]
      summary: Request an idempotent read-only ledger and wallet projection reconciliation
      description: Verifies the append-only ledger before comparing every derived wallet balance. It never changes wallet balances or ledger rows.
      parameters: [{ $ref: "#/components/parameters/ReconciliationIdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationRunInput" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/CreditReconciliationRun" } } } }
        "200": { description: idempotent replay, content: { application/json: { schema: { $ref: "#/components/schemas/CreditReconciliationRun" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /admin/credit/reconciliations/stats:
    get:
      tags: [admin, credit]
      summary: Read aggregate credit reconciliation health counters
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/CreditReconciliationStats" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /admin/credit/reconciliations/{id}:
    get:
      tags: [admin, credit]
      summary: Read one credit reconciliation run
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/CreditReconciliationRun" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/credit/reconciliations/{id}/resume:
    post:
      tags: [admin, credit]
      summary: Resume a queued or interrupted credit reconciliation run
      description: Target-state idempotent. A terminal run is returned unchanged and never executed again.
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationRunInput" } } } }
      responses:
        "200": { description: current run state, content: { application/json: { schema: { $ref: "#/components/schemas/CreditReconciliationRun" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/credit/reconciliations/{id}/wallets:
    get:
      tags: [admin, credit]
      summary: Read per-wallet projection comparisons for one reconciliation run
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: driftOnly, in: query, schema: { type: boolean, default: true } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/CreditReconciliationWalletPage" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/activity-policy:
    get:
      tags: [admin, activity]
      summary: Current activity scoring policy
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ActivityPolicy" } } } }, "403": { $ref: "#/components/responses/Forbidden" } }
    put:
      tags: [admin, activity]
      summary: Publish a new activity scoring policy revision
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ActivityPolicyUpdateInput" } } } }
      responses: { "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/ActivityPolicy" } } } }, "403": { $ref: "#/components/responses/Forbidden" }, "409": { $ref: "#/components/responses/Conflict" } }
  /admin/activity-policy/history:
    get:
      tags: [admin, activity]
      summary: Activity scoring policy revision history
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ActivityPolicyPage" } } } }, "403": { $ref: "#/components/responses/Forbidden" } }
  /admin/users:
    get:
      tags: [admin]
      summary: Search and filter the administration user directory
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: role, in: query, schema: { type: string, enum: [user, mod, admin] } }
        - { name: status, in: query, schema: { type: string, enum: [active, suspended, deleted] } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AdminUserPage" } } } }, "403": { $ref: "#/components/responses/Forbidden" } }
    post:
      tags: [admin]
      summary: Invite and provision a campus account
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AdminUserInviteInput" } } } }
      responses: { "201": { description: invited, content: { application/json: { schema: { $ref: "#/components/schemas/AdminUser" } } } }, "403": { $ref: "#/components/responses/Forbidden" }, "409": { $ref: "#/components/responses/Conflict" } }
  /admin/users/{id}/role:
    patch:
      tags: [admin]
      summary: Change a user's platform role
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AdminUserRoleInput" } } } }
      responses: { "200": { description: updated, content: { application/json: { schema: { $ref: "#/components/schemas/AdminUser" } } } }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "409": { $ref: "#/components/responses/Conflict" }, "428": { $ref: "#/components/responses/RecentAuthRequired" } }
  /admin/users/{id}/sessions/revoke:
    post:
      tags: [admin]
      summary: Revoke every active session for a user
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
