        isLocked: { type: boolean }
        minTrustToPost: { type: integer, minimum: 0, maximum: 3 }
        isQa: { type: boolean }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminTagCreateInput:
      type: object
      required: [slug, name, reason]
