      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/UploadPage" } } } }, "403": { $ref: "#/components/responses/Forbidden" } }
  /admin/media/uploads/{id}/preview-grants:
    post:
      tags: [admin, media]
      summary: Issue a one-time same-origin media preview grant
      description: Requires moderation.content. The moderator must be independent from the uploader and provide an evidence-read reason. No provider identifier or URL is returned.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AdminReasonInput" } } } }
      responses:
        "200": { description: one-time grant, headers: { Cache-Control: { schema: { type: string } } }, content: { application/json: { schema: { $ref: "#/components/schemas/ModerationPreviewGrant" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /admin/media/uploads/{id}/preview:
    get:
      tags: [admin, media]
      summary: Consume a one-time grant and proxy bounded image evidence
      description: Requires moderation.content and the same moderator who created the unexpired grant. The response is same-origin, no-store, MIME checked, bounded to 20 MiB / 20,000 px per side / 40 MP before the first byte, and audited without persisting a URL or key.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: X-Media-Preview-Token, in: header, required: true, schema: { type: string, minLength: 43, maxLength: 43 } }
      responses:
        "200": { description: bounded image stream, headers: { Cache-Control: { schema: { type: string } }, X-Content-Type-Options: { schema: { type: string } } }, content: { image/jpeg: { schema: { type: string, format: binary } }, image/png: { schema: { type: string, format: binary } }, image/gif: { schema: { type: string, format: binary } }, image/webp: { schema: { type: string, format: binary } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/media/uploads/{id}/approve:
    post:
      tags: [admin, media]
      summary: Approve an evidence-backed pending image
      description: Requires strict role hierarchy and a trusted image preview completed by the same moderator. Generic files cannot be approved until malware and sandbox scanner evidence exists.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AdminReasonInput" } } } }
      responses: { "200": { description: approved }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "409": { $ref: "#/components/responses/Conflict" } }
  /admin/media/uploads/{id}/block:
    post:
      tags: [admin, media]
      summary: Quarantine an upload and enqueue durable provider deletion
      description: Supports pending and already-published clean uploads under strict role hierarchy. The database becomes non-public before any provider I/O; deletion is retried from a durable queue and finalizes the blocked state.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AdminReasonInput" } } } }
      responses: { "202": { description: quarantined and deletion queued }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "409": { $ref: "#/components/responses/Conflict" } }
