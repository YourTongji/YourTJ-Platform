  # ============ wallet (bind / claim / ledger) ============
  /wallet:
    get:
      tags: [wallet]
      summary: Balance
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Wallet" } } } } }
  /wallet/bind:
    post:
      tags: [wallet]
      summary: Bind a client-generated Ed25519 public key
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [publicKey], properties: { publicKey: { type: string } } } } }
      responses: { "204": { description: ok } }
  /wallet/claim-challenge:
    get:
      tags: [wallet]
      summary: Get a one-time claim challenge
      responses: { "200": { description: ok, content: { application/json: { schema: { type: object, properties: { challengeId: { type: string }, nonce: { type: string } } } } } } }
  /wallet/claim:
    post:
      tags: [wallet]
      summary: Claim a legacy wallet by signing the challenge (re-derive userHash from 学号+PIN)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [legacyUserHash, challengeId, signature], properties: { legacyUserHash: { type: string }, challengeId: { type: string }, signature: { type: string } } } } }
      responses:
        "200": { description: merged, content: { application/json: { schema: { $ref: "#/components/schemas/Wallet" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /wallet/ledger:
    get:
      tags: [wallet]
      summary: My ledger history (cursor)
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/LedgerPage" } } } } }
  /wallet/ledger/verify:
    get:
      tags: [wallet]
      security: []
      summary: Recompute the ledger hash chain and verify signatures
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/LedgerVerify" } } } } }

  # ============ credit: controlled money ops (NO free transfer — design §6.3) ============
  /credit/signing-intents:
    post:
      tags: [credit]
      summary: Create a request- and snapshot-bound one-time wallet signing intent
      parameters: [{ $ref: "#/components/parameters/WalletIdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SigningIntentInput" } } } }
      responses:
        "200": { description: exact bytes to sign, content: { application/json: { schema: { $ref: "#/components/schemas/SigningIntent" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /credit/tip:
    post:
      tags: [credit]
      summary: Tip — controlled transfer bound to a specific piece of content
      parameters: [{ $ref: "#/components/parameters/WalletIntent" }, { $ref: "#/components/parameters/WalletSig" }, { $ref: "#/components/parameters/WalletIdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TipInput" } } } }
      responses:
        "204": { description: tipped }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  # NOTE: /credit/bounty and /credit/bounty/{id}/confirm are aliases for
  # /credit/tasks POST and /credit/tasks/{id}/action confirm; backend only
  # exposes the canonical /credit/tasks routes.

  # ============ password auth ============
  /auth/password/login:
    post:
      tags: [auth]
      security: []
      summary: Campus email + password login
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email, password], properties: { email: { type: string, format: email }, password: { type: string, format: password, minLength: 1, maxLength: 128 } } } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthTokens" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/password/forgot:
    post:
      tags: [auth]
      security: []
      summary: Request a password-reset code
      description: Always returns the same successful response for valid campus-email syntax, whether or not an eligible password account exists.
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email, captchaToken], properties: { email: { type: string, format: email }, captchaToken: { type: string, minLength: 1 } } } } } }
      responses:
        "204": { description: Request accepted without revealing account eligibility or provider delivery }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /auth/password/reset:
    post:
      tags: [auth]
      security: []
      summary: Reset password with code
      description: Accepts only a password-reset-purpose code and revokes every access and refresh session on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email: { type: string, format: email }
                code: { type: string, pattern: '^[0-9]{6}$' }
                newPassword: { type: string, format: password, minLength: 8, maxLength: 128 }
      responses:
        "204": { description: ok }
        "400": { $ref: "#/components/responses/BadRequest" }
  /auth/password/change:
    post:
      tags: [auth]
      summary: Change the authenticated account's password
      description: Requires the current password, preserves the current device session, and revokes other sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, format: password, minLength: 1, maxLength: 128 }
                newPassword: { type: string, format: password, minLength: 8, maxLength: 128 }
      responses:
        "204": { description: ok }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }


  # ---- escrow market: tasks ----
  /credit/tasks:
    get:
      tags: [credit]
      summary: Task square / my tasks
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, in_progress, submitted, completed, cancelled, all] } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/TaskPage" } } } } }
    post:
      tags: [credit]
      summary: Publish a task (escrow_hold of the reward)
      parameters: [{ $ref: "#/components/parameters/WalletIntent" }, { $ref: "#/components/parameters/WalletSig" }, { $ref: "#/components/parameters/WalletIdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TaskInput" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Task" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /credit/tasks/{id}/accept:
    post:
      tags: [credit]
      summary: Accept a task
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: accepted }, "400": { $ref: "#/components/responses/BadRequest" }, "409": { $ref: "#/components/responses/Conflict" } }
  /credit/tasks/{id}/action:
    post:
      tags: [credit]
      summary: Two-phase confirm — submit / confirm(release) / cancel / reject / delete
      description: confirm/cancel/reject and an open-task delete require wallet intent, signature and idempotency headers; submit and deletion after cancellation do not move value.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { $ref: "#/components/parameters/OptionalWalletIntent" }, { $ref: "#/components/parameters/OptionalWalletSig" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TaskAction" } } } }
      responses: { "204": { description: updated }, "400": { $ref: "#/components/responses/BadRequest" }, "409": { $ref: "#/components/responses/Conflict" } }

  # ---- escrow market: products / purchases ----
  /credit/products:
    get:
      tags: [credit]
      summary: Product listings
      parameters: [{ name: status, in: query, schema: { type: string, enum: [on_sale, off_sale, sold_out, all] } }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ProductPage" } } } } }
    post:
      tags: [credit]
      summary: List a product
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ProductInput" } } } }
      responses: { "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Product" } } } } }
  /credit/products/{id}/purchase:
    post:
      tags: [credit]
      summary: Buy a product (escrow_hold of the price)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { $ref: "#/components/parameters/WalletIntent" }, { $ref: "#/components/parameters/WalletSig" }, { $ref: "#/components/parameters/WalletIdempotencyKey" }]
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Purchase" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /credit/purchases:
    get:
      tags: [credit]
      summary: My orders (as buyer or seller)
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/PurchasePage" } } } } }
  /credit/purchases/{id}/action:
    post:
      tags: [credit]
      summary: Escrow steps — accept / deliver / confirm(release) / cancel(refund)
      description: confirm and cancel require wallet intent, signature and idempotency headers; accept and deliver are non-value seller transitions.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { $ref: "#/components/parameters/OptionalWalletIntent" }, { $ref: "#/components/parameters/OptionalWalletSig" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PurchaseAction" } } } }
      responses: { "204": { description: updated }, "400": { $ref: "#/components/responses/BadRequest" }, "409": { $ref: "#/components/responses/Conflict" } }

  # ============ search ============
  /search:
    get:
      tags: [search]
      security: [{}, { bearer: [] }]
      summary: Privacy-safe typed federated search across catalogue and community objects
      description: Meilisearch ranks candidate ids. Owner domains rehydrate and authorize every hit before canonical highlight ranges or conservative spelling suggestions are computed.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2, maxLength: 100 } }
        - { name: type, in: query, schema: { type: string, enum: [course, teacher, review, thread, user, board, tag, all], default: all } }
        - { name: limit, in: query, schema: { type: integer, default: 10, minimum: 1, maximum: 30 } }
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque cursor returned for the same q and a specific non-all type; all-scope pagination uses hasMoreScopes then switches type.
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/SearchResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

