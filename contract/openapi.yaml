    get:
      tags: [forum]
      summary: Count unread private messages across active conversations
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DmCounts" }
  /forum/dm/requests/{id}/accept:
    post:
      tags: [forum]
      summary: Accept an incoming message request
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: accepted conversation, content: { application/json: { schema: { $ref: "#/components/schemas/DmConversation" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /forum/dm/requests/{id}:
    delete:
      tags: [forum]
      summary: Decline an incoming request or withdraw an outgoing request without blocking or notifying
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: removed }, "404": { $ref: "#/components/responses/NotFound" } }
  /forum/dm/requests/{id}/report:
    post:
      tags: [forum]
      summary: Report the one request message and remove the incoming request
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/DmReportInput" } } } }
      responses: { "202": { description: queued and request removed }, "404": { $ref: "#/components/responses/NotFound" } }
  /forum/dm/conversations/{id}:
    delete:
      tags: [forum]
      summary: Hide a conversation for the current participant
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: hidden for this participant }, "404": { $ref: "#/components/responses/NotFound" } }
  /forum/dm/conversations/{id}/recover:
    post:
      tags: [forum]
      summary: Recover a participant-hidden conversation
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: recovered }, "404": { $ref: "#/components/responses/NotFound" } }
  /forum/dm/conversations/{id}/archive:
    put:
      tags: [forum]
      summary: Archive a conversation for the current participant
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: archived }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      tags: [forum]
      summary: Return an archived conversation to the inbox
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: unarchived }, "404": { $ref: "#/components/responses/NotFound" } }
  /forum/dm/conversations/{id}/mute:
    put:
      tags: [forum]
      summary: Mute notifications for a conversation
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: muted }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      tags: [forum]
      summary: Restore notifications for a conversation
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: unmuted }, "404": { $ref: "#/components/responses/NotFound" } }
