  # /credit/tasks POST and /credit/tasks/{id}/action confirm; backend only
  # exposes the canonical /credit/tasks routes.

  # ============ password auth — local-only, not in OpenAPI for mobile thin clients ============
  /auth/password/login:
    post:
      tags: [auth]
      security: []
      summary: Campus email + password login
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email, password], properties: { email: { type: string, format: email }, password: { type: string, format: password } } } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthTokens" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/password/forgot:
    post:
      tags: [auth]
      security: []
      summary: Request a password-reset code
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email, captchaToken], properties: { email: { type: string, format: email }, captchaToken: { type: string, minLength: 1 } } } } } }
      responses:
        "204": { description: sent }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /auth/password/reset:
    post:
      tags: [auth]
      security: []
      summary: Reset password with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email: { type: string, format: email }
                code: { type: string }
                newPassword: { type: string }
      responses:
        "204": { description: ok }
        "400": { $ref: "#/components/responses/BadRequest" }
  /auth/password/change:
    post:
      tags: [auth]
      summary: Change the authenticated account's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string }
      responses:
        "204": { description: ok }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }


