        contentVersion: { type: integer, format: int64, minimum: 1 }
        attachments: { type: array, maxItems: 4, items: { $ref: "#/components/schemas/ForumAttachment" } }
        voteCount: { type: integer }
        viewerVote: { type: string, enum: [up, down], nullable: true }
        isBookmarked: { type: boolean }
        isDeleted: { type: boolean }
        isHidden: { type: boolean }
        editedAt: { type: integer, nullable: true }
        createdAt: { type: integer }
        quotedCommentId: { type: string, nullable: true }
        isSolved: { type: boolean }
        canEdit: { type: boolean, description: Server-authoritative author edit permission for this viewer. }
        canDelete: { type: boolean, description: Server-authoritative author delete permission for this viewer. }
        canModerate: { type: boolean, description: Server-authoritative moderation permission including role hierarchy. }
    CommentInput:
      type: object
      required: [body]
      properties:
        parentId: { type: string }
        body: { type: string, minLength: 1, maxLength: 16000 }
        contentFormat: { $ref: "#/components/schemas/ContentFormat" }
        attachmentAssetIds:
          type: array
          maxItems: 4
          uniqueItems: true
          description: Ordered asset ids that must exactly match markdown_v1 yourtj-asset image destinations.
          items: { type: string, pattern: '^[1-9][0-9]*$' }
        quotedCommentId: { type: string }
    CommentUpdateInput:
      type: object
      required: [body]
      properties:
        expectedVersion:
          type: integer
