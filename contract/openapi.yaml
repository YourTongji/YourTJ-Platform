    get:
      tags: [forum]
      summary: List messages in a conversation
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/DmMessagePage" } } } } }
    post:
      tags: [forum]
      summary: Send a message
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/DmMessageInput" } } } }
      responses: { "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/DmMessage" } } } } }
  /forum/dm/conversations/{id}/read:
    post:
      tags: [forum]
      summary: Mark a DM conversation read through a message
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/DmReadInput" } } } }
      responses: { "204": { description: read position updated }, "404": { $ref: "#/components/responses/NotFound" } }
