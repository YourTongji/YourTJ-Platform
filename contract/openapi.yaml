openapi: 3.0.3
info:
  title: YourTJ v2 API
  version: 2.0.0
  description: >
    The single source of truth for the v2 HTTP contract. Client type bindings
    (TS / Swift / Dart) are generated from this file — change the API here first,
    then implement and regenerate. Conventions: bearer JWT auth; money/escrow
    writes use one-time signing intents and require `X-Wallet-Intent`,
    `X-Wallet-Sig`, and the same `Idempotency-Key`; cursor pagination on public
    lists; the error envelope `{ error: { code, message } }`; timestamps are Unix seconds.
servers:
  - url: https://api.yourtj.de/api/v2

tags:
  - { name: auth }
  - { name: identity }
  - { name: activity }
  - { name: wallet }
  - { name: credit }
  - { name: search }
  - { name: courses }
  - { name: selection, description: 选课 (PK) catalogue mirrored from 一系统 }
  - { name: reviews }
  - { name: forum }
  - { name: notifications }
  - { name: platform }
  - { name: media }
  - { name: admin }

security:
  - bearer: []

components:
  securitySchemes:
    bearer: { type: http, scheme: bearer, bearerFormat: JWT }

  parameters:
    Cursor: { name: cursor, in: query, schema: { type: string }, description: Opaque pagination cursor }
    Limit: { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
    WalletIntent:
      name: X-Wallet-Intent
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: One-time signing intent returned by POST /credit/signing-intents
    WalletSig:
      name: X-Wallet-Sig
      in: header
      required: true
      schema: { type: string }
      description: Base64 Ed25519 signature over the intent's exact signingBytes
    OptionalWalletIntent:
      name: X-Wallet-Intent
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: Required only for the value-moving actions documented on this operation
    OptionalWalletSig:
      name: X-Wallet-Sig
      in: header
      required: false
      schema: { type: string }
      description: Required only for the value-moving actions documented on this operation
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 128 }
    WalletIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    ReconciliationIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 128, pattern: '^[!-~]+$' }
    AppealIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 128, pattern: '^[A-Za-z0-9._:-]+$' }
      description: Account-scoped key. Reuse with a different event or reason returns conflict.

  responses:
    BadRequest:   { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Unauthorized: { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Forbidden:    { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    RecentAuthRequired: { description: A fresh session-bound authentication is required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    NotFound:     { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Conflict:     { description: Conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    RateLimited:  { description: Too many requests, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    ServiceUnavailable: { description: Upstream service unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
    Page:
      type: object
      description: Base cursor-pagination envelope; typed lists override `items`.
      properties:
        items: { type: array, items: { type: object } }
        nextCursor: { type: string, nullable: true }
        hasMore: { type: boolean }

    # ---- identity ----
    Account:
      type: object
      properties:
        id: { type: string }
        handle: { type: string }
        avatarUrl:
          type: string
          nullable: true
          deprecated: true
          description: Legacy compatibility field; profile images are controlled media assets.
        role: { type: string, enum: [user, mod, admin] }
        capabilities:
          type: array
          items: { type: string }
        trustLevel: { type: integer }
        createdAt: { type: integer }
    ProfileVisibility:
      type: string
      enum: [public, campus, only_me]
    RelationshipListVisibility:
      type: string
      enum: [public, campus, followers, only_me]
    DmPolicy:
      type: string
      description: "following means accounts the recipient follows may start a new conversation."
      enum: [everyone, following, nobody]
    ActivityVisibility:
      type: string
      description: Controls profile activity lists, not the visibility of canonical public forum content.
      enum: [public, campus, only_me]
    MentionPolicy:
      type: string
      description: "following means accounts the recipient follows may create a semantic mention notification."
      enum: [everyone, following, nobody]
    MyProfile:
      type: object
      required: [accountId, displayName, bio, website, avatarAssetId, bannerAssetId]
      properties:
        accountId: { type: string }
        displayName: { type: string, nullable: true, minLength: 1, maxLength: 50 }
        bio: { type: string, nullable: true, maxLength: 500 }
        website: { type: string, format: uri, nullable: true, maxLength: 2048 }
        avatarAssetId: { type: string, nullable: true }
        bannerAssetId: { type: string, nullable: true }
    ProfileUpdateInput:
      type: object
      required: [displayName, bio, website]
      properties:
        displayName: { type: string, nullable: true, minLength: 1, maxLength: 50 }
        bio: { type: string, nullable: true, maxLength: 500 }
        website:
          type: string
          format: uri
          nullable: true
          maxLength: 2048
          description: HTTPS URLs only.
    ProfilePrivacy:
      type: object
      required: [profileVisibility, activityVisibility, followersVisibility, followingVisibility, discoverable, dmPolicy, mentionPolicy]
      properties:
        profileVisibility: { $ref: "#/components/schemas/ProfileVisibility" }
        activityVisibility: { $ref: "#/components/schemas/ActivityVisibility" }
        followersVisibility: { $ref: "#/components/schemas/RelationshipListVisibility" }
        followingVisibility: { $ref: "#/components/schemas/RelationshipListVisibility" }
        discoverable:
          type: boolean
          description: Controls third-party relationship-list discovery and future account search, not exact-handle navigation.
        dmPolicy: { $ref: "#/components/schemas/DmPolicy" }
        mentionPolicy: { $ref: "#/components/schemas/MentionPolicy" }
    ProfilePrivacyUpdateInput:
      type: object
      required: [profileVisibility, followersVisibility, followingVisibility, discoverable, dmPolicy]
      description: New activity and mention fields are optional only for rolling compatibility with older clients; current clients send both.
      properties:
        profileVisibility: { $ref: "#/components/schemas/ProfileVisibility" }
        activityVisibility: { $ref: "#/components/schemas/ActivityVisibility" }
        followersVisibility: { $ref: "#/components/schemas/RelationshipListVisibility" }
        followingVisibility: { $ref: "#/components/schemas/RelationshipListVisibility" }
        discoverable: { type: boolean }
        dmPolicy: { $ref: "#/components/schemas/DmPolicy" }
        mentionPolicy: { $ref: "#/components/schemas/MentionPolicy" }
    ProfileAssetInput:
      type: object
      required: [assetId]
      properties:
        assetId: { type: string }
    AuthTokens:
      type: object
      required: [accessToken, refreshToken, account]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        account: { $ref: "#/components/schemas/Account" }
    EmailCodePurpose:
      type: string
      enum: [login, registration, appeal]
    EmailCodeRequest:
      type: object
      required: [email, captchaToken]
      properties:
        email: { type: string, format: email }
        captchaToken: { type: string, minLength: 1 }
        purpose:
          allOf: [{ $ref: "#/components/schemas/EmailCodePurpose" }]
          description: Optional only for rolling compatibility. Appeal codes are consumed only by /auth/appeal/email/verify.
    EmailCodeVerification:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string, pattern: '^[0-9]{6}$' }
        purpose:
          allOf: [{ $ref: "#/components/schemas/EmailCodePurpose" }]
          description: Optional only for rolling compatibility. This full-login endpoint rejects appeal-purpose codes.
        handle: { type: string, minLength: 3, maxLength: 30 }
        password: { type: string, format: password, minLength: 8, maxLength: 128 }
    RefreshInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 1, maxLength: 256 }
    Session:
      type: object
      required: [id, isCurrent, createdAt, lastUsedAt, expiresAt]
      properties:
        id: { type: string }
        isCurrent: { type: boolean }
        deviceLabel: { type: string, nullable: true, maxLength: 200 }
        createdAt: { type: integer }
        lastUsedAt: { type: integer }
        expiresAt: { type: integer }
    SessionPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items: { type: array, items: { $ref: "#/components/schemas/Session" } }
    RecentAuthMethod:
      type: string
      enum: [password, email_code]
    RecentAuthStatus:
      type: object
      required: [sessionBound, isFresh, authenticatedAt, expiresAt, method, availableMethods]
      properties:
        sessionBound:
          type: boolean
          description: False for rolling-window legacy JWTs; high-risk mutations fail closed until a new session login.
        isFresh: { type: boolean }
        authenticatedAt: { type: integer, nullable: true }
        expiresAt: { type: integer, nullable: true }
        method:
          allOf: [{ $ref: "#/components/schemas/RecentAuthMethod" }]
          nullable: true
        availableMethods:
          type: array
          items: { $ref: "#/components/schemas/RecentAuthMethod" }
          description: Password appears only when the authenticated account has one; email_code never accepts a client-supplied email.
    RecentAuthVerifyInput:
      type: object
      additionalProperties: false
      required: [method]
      properties:
        method: { $ref: "#/components/schemas/RecentAuthMethod" }
        password: { type: string, format: password, minLength: 1, maxLength: 128 }
        code: { type: string, pattern: '^[0-9]{6}$' }
      description: Exactly the credential matching method must be supplied; the server binds success to the current revocable session.
    AppealAccessToken:
      type: object
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
          description: Short-lived bearer accepted only by /me/appeals and /me/governance-notices.
        expiresAt: { type: integer }
    AppealEmailVerification:
      type: object
      additionalProperties: false
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string, pattern: '^[0-9]{6}$' }
    AppealStatus:
      type: string
      enum: [submitted, in_review, upheld, overturned, amended, withdrawn]
    AppealHistory:
      type: object
      required: [id, toStatus, reason, createdAt]
      properties:
        id: { type: string }
        fromStatus: { allOf: [{ $ref: "#/components/schemas/AppealStatus" }], nullable: true }
        toStatus: { $ref: "#/components/schemas/AppealStatus" }
        reason: { type: string, minLength: 3, maxLength: 1000 }
        metadata:
          type: object
          nullable: true
          description: Bounded public decision metadata; currently only a shortened sanction endsAt.
        createdAt: { type: integer }
    Appeal:
      type: object
      required: [id, governanceEventId, originalAction, targetKind, targetId, dispositionKind, status, submissionReason, submittedAt, appealableUntil, version, history]
      properties:
        id: { type: string }
        governanceEventId: { type: string }
        originalAction: { type: string }
        originalReason:
          type: string
          nullable: true
          maxLength: 1000
          description: Safe disposition summary for the owner; authorized staff may receive the internal reason.
        targetKind: { type: string, enum: [sanction, forum_thread, forum_comment, review] }
        targetId: { type: string }
        dispositionKind: { type: string, enum: [silence, suspend, hide, delete] }
        status: { $ref: "#/components/schemas/AppealStatus" }
        submissionReason: { type: string, minLength: 3, maxLength: 1000 }
        submittedAt: { type: integer }
        appealableUntil: { type: integer }
        reviewStartedAt: { type: integer, nullable: true }
        decisionReason: { type: string, nullable: true, minLength: 3, maxLength: 1000 }
        amendment: { type: object, nullable: true }
        decidedAt: { type: integer, nullable: true }
        version: { type: integer, minimum: 1 }
        history: { type: array, items: { $ref: "#/components/schemas/AppealHistory" } }
    AdminAppeal:
      allOf:
        - $ref: "#/components/schemas/Appeal"
        - type: object
          required: [appellantAccountId]
          properties:
            appellantAccountId: { type: string }
            reviewerAccountId: { type: string, nullable: true }
    SubmitAppealInput:
      type: object
      additionalProperties: false
      required: [governanceEventId, reason]
      properties:
        governanceEventId: { type: string }
        reason: { type: string, minLength: 3, maxLength: 1000 }
    AppealTransitionInput:
      type: object
      additionalProperties: false
      required: [expectedVersion, reason]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        reason: { type: string, minLength: 3, maxLength: 1000 }
    AppealDecisionInput:
      type: object
      additionalProperties: false
      required: [expectedVersion, outcome, reason]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        outcome: { type: string, enum: [upheld, overturned, amended] }
        reason: { type: string, minLength: 3, maxLength: 1000 }
        amendedEndsAt:
          type: integer
          nullable: true
          description: Only for amended sanctions; must shorten the active sanction.
    GovernanceNotice:
      type: object
      required: [id, noticeType, subjectKind, subjectId, summary, targetUrl, read, createdAt]
      properties:
        id: { type: string }
        noticeType:
          type: string
          enum: [sanction_applied, content_restricted, appeal_submitted, appeal_in_review, appeal_upheld, appeal_overturned, appeal_amended, appeal_withdrawn]
        subjectKind: { type: string, enum: [sanction, forum_thread, forum_comment, review, appeal] }
        subjectId: { type: string }
        summary: { type: string, minLength: 1, maxLength: 500 }
        appealId: { type: string, nullable: true }
        targetUrl: { type: string, pattern: '^/' }
        read: { type: boolean }
        readAt: { type: integer, nullable: true }
        createdAt: { type: integer }
    GovernanceNoticeReadInput:
      type: object
      additionalProperties: false
      properties:
        ids: { type: array, minItems: 1, maxItems: 100, items: { type: string } }
        all: { type: boolean }

    # ---- courses / reviews ----
    Department: { type: object, properties: { id: { type: string }, name: { type: string } } }
    Teacher:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        title: { type: string, nullable: true }
        department: { type: string, nullable: true }
    Course:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        credit: { type: number, nullable: true }
        department: { type: string, nullable: true }
        teacherName: { type: string, nullable: true }
        reviewCount: { type: integer }
        reviewAvg: { type: number, nullable: true }
    CourseDetail:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            teachers: { type: array, items: { $ref: "#/components/schemas/Teacher" } }
            aliases: { type: array, items: { type: string } }
    Review:
      type: object
      properties:
        id: { type: string }
        courseId: { type: string }
        rating: { type: integer }
        comment: { type: string, nullable: true }
        score: { type: string, nullable: true }
        semester: { type: string, nullable: true }
        authorHandle: { type: string }
        authorAvatar: { type: string, nullable: true }
        approveCount: { type: integer }
        status: { type: string, enum: [visible, hidden, pending] }
        createdAt: { type: integer }
    ReviewInput:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 0, maximum: 5 }
        comment: { type: string }
        semester: { type: string }
        score: { type: string }
    CreateReviewInput:
      allOf:
        - $ref: "#/components/schemas/ReviewInput"
        - type: object
          required: [captchaToken]
          properties:
            captchaToken: { type: string, minLength: 1 }
    AiSummary:
      type: object
      properties:
        courseId: { type: string }
        summary: { type: string }
        model: { type: string }
        updatedAt: { type: integer }
    Report:
      type: object
      required: [id, reviewId, reason, status, createdAt]
      properties:
        id: { type: string }
        reviewId: { type: string }
        reason: { type: string }
        status: { type: string, enum: [open, upheld, rejected, ignored] }
        courseId: { type: string, nullable: true }
        reviewAuthorHandle: { type: string, nullable: true }
        reviewRating: { type: integer, minimum: 0, maximum: 5, nullable: true }
        reviewStatus: { type: string, enum: [visible, hidden, pending], nullable: true }
        reviewExcerpt: { type: string, nullable: true }
        createdAt: { type: integer }
    ReviewReportResolutionInput:
      type: object
      required: [action, note]
      properties:
        action: { type: string, enum: [uphold, reject, ignore] }
        note: { type: string, minLength: 3, maxLength: 1000 }

    # ---- wallet / credit (Web2.5) ----
    Wallet: { type: object, properties: { accountId: { type: string }, balance: { type: integer } } }
    LedgerEntry:
      type: object
      properties:
        seq: { type: integer }
        txId: { type: string }
        type: { type: string, enum: [mint, tip, escrow_hold, escrow_release] }
        fromAccount: { type: string, nullable: true }
        toAccount: { type: string, nullable: true }
        amount: { type: integer }
        hash: { type: string }
        createdAt: { type: integer }
    LedgerVerify:
      type: object
      properties:
        ok: { type: boolean }
        latestSeq: { type: integer }
        latestHash: { type: string }
    ReconciliationRunInput:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
    CreditReconciliationRun:
      type: object
      required: [id, status, requestedBy, reason, walletsChecked, driftedWallets, missingWallets, balanceDriftedWallets, sequenceDriftedWallets, totalAbsoluteDrift, createdAt]
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, succeeded, failed] }
        requestedBy: { type: string }
        reason: { type: string }
        ledgerOk: { type: boolean, nullable: true }
        ledgerLatestSeq: { type: integer, format: int64, nullable: true }
        ledgerLatestHash: { type: string, nullable: true }
        ledgerFailureSeq: { type: integer, format: int64, nullable: true }
        walletsChecked: { type: integer, format: int64, minimum: 0 }
        driftedWallets: { type: integer, format: int64, minimum: 0 }
        missingWallets: { type: integer, format: int64, minimum: 0 }
        balanceDriftedWallets: { type: integer, format: int64, minimum: 0 }
        sequenceDriftedWallets: { type: integer, format: int64, minimum: 0 }
        totalAbsoluteDrift: { type: string, pattern: '^[0-9]+$' }
        errorCode: { type: string, nullable: true }
        createdAt: { type: integer, format: int64 }
        startedAt: { type: integer, format: int64, nullable: true }
        completedAt: { type: integer, format: int64, nullable: true }
    CreditReconciliationWallet:
      type: object
      required: [accountId, expectedBalance, delta, expectedLastSeq, walletExists, hasBalanceDrift, hasSequenceDrift]
      properties:
        accountId: { type: string }
        expectedBalance: { type: string, pattern: '^-?[0-9]+$' }
        actualBalance: { type: string, pattern: '^-?[0-9]+$', nullable: true }
        delta: { type: string, pattern: '^-?[0-9]+$' }
        expectedLastSeq: { type: integer, format: int64, minimum: 0 }
        actualLastSeq: { type: integer, format: int64, minimum: 0, nullable: true }
        walletExists: { type: boolean }
        hasBalanceDrift: { type: boolean }
        hasSequenceDrift: { type: boolean }
    CreditReconciliationStats:
      type: object
      required: [totalRuns, failedRuns, ledgerFailureRuns, runsWithDrift]
      properties:
        totalRuns: { type: integer, format: int64, minimum: 0 }
        failedRuns: { type: integer, format: int64, minimum: 0 }
        ledgerFailureRuns: { type: integer, format: int64, minimum: 0 }
        runsWithDrift: { type: integer, format: int64, minimum: 0 }
        latestRun:
          allOf: [{ $ref: "#/components/schemas/CreditReconciliationRun" }]
          nullable: true
    SigningIntentInput:
      type: object
      required: [action, request]
      properties:
        action:
          type: string
          enum: [credit.tip, credit.task.create, credit.task.action, credit.product.purchase, credit.purchase.action]
        request: { type: object }
    SigningIntent:
      type: object
      required: [intentId, signingBytes, expiresAt]
      properties:
        intentId: { type: string, format: uuid }
        signingBytes: { type: string }
        expiresAt: { type: integer, format: int64 }
    TipInput:
      type: object
      required: [toAccountId, amount, targetType, targetId]
      description: The recipient must be the active author of the visible target; self-tips are rejected.
      properties:
        toAccountId: { type: string }
        amount: { type: integer, minimum: 1 }
        targetType: { type: string, enum: [review, thread, comment] }
        targetId: { type: string }
    Task:
      type: object
      properties:
        id: { type: string }
        creatorId: { type: string }
        acceptorId: { type: string, nullable: true }
        title: { type: string }
        description: { type: string, nullable: true }
        rewardAmount: { type: integer }
        contactInfo: { type: string, nullable: true, description: Visible only to controlled parties }
        status: { type: string, enum: [open, in_progress, submitted, completed, cancelled] }
        createdAt: { type: integer }
    TaskInput:
      type: object
      required: [title, rewardAmount]
      properties:
        title: { type: string }
        description: { type: string }
        rewardAmount: { type: integer, minimum: 1 }
        contactInfo: { type: string }
    TaskAction:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [submit, confirm, cancel, reject, delete] }
    Product:
      type: object
      description: Public listing data. Private delivery instructions are never exposed here.
      properties:
        id: { type: string }
        sellerId: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        price: { type: integer }
        stock: { type: integer }
        status: { type: string, enum: [on_sale, off_sale, sold_out] }
        createdAt: { type: integer }
    ProductInput:
      type: object
      required: [title, price, stock]
      properties:
        title: { type: string }
        description: { type: string }
        price: { type: integer, minimum: 1 }
        stock: { type: integer, minimum: 0 }
        deliveryInfo: { type: string }
    Purchase:
      type: object
      properties:
        id: { type: string }
        productId: { type: string }
        buyerId: { type: string }
        sellerId: { type: string }
        amount: { type: integer }
        status: { type: string, enum: [pending, accepted, delivered, completed, cancelled] }
        deliveryInfo: { type: string, nullable: true, description: Visible only to the purchase buyer and seller }
        createdAt: { type: integer }
    PurchaseAction:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [accept, deliver, confirm, cancel] }

    # ---- search ----
    CourseSearchHit:
      type: object
      required: [id, code, name, credit, department, teacherName, reviewCount, reviewAvg]
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        credit: { type: number, nullable: true }
        department: { type: string, nullable: true }
        teacherName: { type: string, nullable: true }
        reviewCount: { type: integer, minimum: 0 }
        reviewAvg: { type: number, nullable: true }
    ReviewSearchHit:
      type: object
      required: [id, courseId, courseName, rating, comment, approveCount, createdAt]
      properties:
        id: { type: string }
        courseId: { type: string }
        courseName: { type: string }
        rating: { type: integer, minimum: 0, maximum: 5 }
        comment: { type: string, nullable: true }
        approveCount: { type: integer, minimum: 0 }
        createdAt: { type: integer }
    ThreadSearchHit:
      type: object
      required: [id, title, bodyExcerpt, board, tags, authorHandle, replyCount, voteCount, createdAt, status]
      properties:
        id: { type: string }
        title: { type: string }
        bodyExcerpt: { type: string }
        board: { type: string }
        tags: { type: array, items: { type: string } }
        authorHandle: { type: string }
        replyCount: { type: integer, minimum: 0 }
        voteCount: { type: integer }
        createdAt: { type: integer }
        status: { type: string, enum: [visible] }
    UserSearchHit:
      type: object
      required: [id, handle, displayName, avatarUrl, role, followerCount, following]
      properties:
        id: { type: string }
        handle: { type: string }
        displayName: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, mod, admin] }
        followerCount: { type: integer, minimum: 0 }
        following: { type: boolean }
    BoardSearchHit:
      type: object
      required: [id, slug, name, description, threadCount]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        threadCount: { type: integer, minimum: 0 }
    TagSearchHit:
      type: object
      required: [id, slug, name, description, threadCount]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        threadCount: { type: integer, minimum: 0 }
    SearchResultScope:
      type: string
      enum: [course, review, thread, user, board, tag]
    SearchHighlightRange:
      type: object
      required: [start, end]
      description: Half-open Unicode character offsets into the named canonical field; clients render text nodes and never HTML.
      properties:
        start: { type: integer, minimum: 0 }
        end: { type: integer, minimum: 1 }
    SearchHighlight:
      type: object
      required: [scope, id, field, ranges]
      description: Presentation metadata computed only after the owning domain rehydrates and authorizes the result.
      properties:
        scope: { $ref: "#/components/schemas/SearchResultScope" }
        id: { type: string }
        field: { type: string, enum: [name, code, teacherName, department, courseName, comment, title, bodyExcerpt, board, authorHandle, handle, displayName, slug, description] }
        ranges:
          type: array
          maxItems: 8
          items: { $ref: "#/components/schemas/SearchHighlightRange" }
    SearchResult:
      type: object
      required: [courses, reviews, threads, users, boards, tags, nextCursor, hasMore, hasMoreScopes, failedScopes, highlights, suggestedQuery]
      properties:
        courses: { type: array, items: { $ref: "#/components/schemas/CourseSearchHit" } }
        reviews: { type: array, items: { $ref: "#/components/schemas/ReviewSearchHit" } }
        threads: { type: array, items: { $ref: "#/components/schemas/ThreadSearchHit" } }
        users: { type: array, items: { $ref: "#/components/schemas/UserSearchHit" } }
        boards: { type: array, items: { $ref: "#/components/schemas/BoardSearchHit" } }
        tags: { type: array, items: { $ref: "#/components/schemas/TagSearchHit" } }
        nextCursor:
          type: string
          nullable: true
          description: Opaque continuation for a specific non-all type, bound to the normalized query and type.
        hasMore: { type: boolean }
        hasMoreScopes:
          type: array
          items: { $ref: "#/components/schemas/SearchResultScope" }
          description: Sections with more privacy-revalidated results; all-scope clients use this for "see more" links.
        failedScopes:
          type: array
          items: { $ref: "#/components/schemas/SearchResultScope" }
          description: Included sections that failed while other sections remained usable. Never contains internal errors.
        highlights:
          type: array
          items: { $ref: "#/components/schemas/SearchHighlight" }
          description: Safe ranges over the returned canonical fields; never snippets or markup copied from the search index.
        suggestedQuery:
          type: string
          nullable: true
          description: Conservative spelling suggestion inferred only from words in the visible, owner-rehydrated result set; null when ambiguous.

    # ---- selection (选课/PK) ----
    Calendar: { type: object, properties: { id: { type: string }, name: { type: string }, isCurrent: { type: boolean } } }
    Campus: { type: object, properties: { id: { type: string }, name: { type: string } } }
    Faculty: { type: object, properties: { id: { type: string }, name: { type: string }, campusId: { type: string, nullable: true } } }
    Major:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        facultyId: { type: string, nullable: true }
        grade: { type: string, nullable: true }
    CourseNature: { type: object, properties: { id: { type: string }, name: { type: string } } }
    SelectionCourse:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        credit: { type: number }
        natureId: { type: string, nullable: true }
        campus: { type: string, nullable: true }
        teacherName: { type: string, nullable: true }
    TimeSlot:
      type: object
      properties:
        courseId: { type: string }
        teacherName: { type: string, nullable: true }
        weekday: { type: integer }
        startSlot: { type: integer }
        endSlot: { type: integer }
        weeks: { type: string }
        location: { type: string, nullable: true }
    LatestUpdate: { type: object, properties: { source: { type: string }, fetchedAt: { type: integer } } }

    # ---- forum (F1) ----
    Board:
      type: object
      required: [id, slug, name, parentId, description, position, isLocked, minTrustToPost, isQa, threadCount, canPost, postingRestriction]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        parentId: { type: string, nullable: true }
        description: { type: string, nullable: true }
        position: { type: integer }
        isLocked: { type: boolean }
        minTrustToPost: { type: integer, minimum: 0, maximum: 3 }
        isQa: { type: boolean }
        threadCount: { type: integer, minimum: 0 }
        canPost: { type: boolean }
        postingRestriction:
          type: string
          enum: [login_required, board_locked, trust_level]
          nullable: true
    Tag: { type: object, properties: { id: { type: string }, slug: { type: string }, name: { type: string }, description: { type: string, nullable: true }, threadCount: { type: integer }, createdAt: { type: integer } } }
    ContentFormat:
      type: string
      enum: [plain_v1, markdown_v1]
      default: plain_v1
    ForumAttachment:
      type: object
      description: Minimal clean Media projection for one server-validated yourtj-asset Markdown reference. The canonical destination is never a fetch URL.
      required: [assetId, reference, position, alt, url, width, height]
      properties:
        assetId: { type: string }
        reference: { type: string, pattern: '^yourtj-asset:[1-9][0-9]*$' }
        position: { type: integer, minimum: 0, maximum: 7 }
        alt: { type: string, minLength: 1, maxLength: 300 }
        url: { type: string, format: uri, description: Authorization-derived clean image URL; never persisted in Forum content. }
        width: { type: integer, minimum: 1, maximum: 20000, nullable: true }
        height: { type: integer, minimum: 1, maximum: 20000, nullable: true }
    Thread:
      type: object
      required: [id, boardId, authorHandle, title, bodyExcerpt, contentVersion, replyCount, voteCount, hotScore, status, createdAt, lastActivityAt, tags, attachments, viewerVote, isBookmarked, canEdit, canDelete, canModerate]
      properties:
        id: { type: string }
        boardId: { type: string }
        authorHandle: { type: string }
        title: { type: string }
        bodyExcerpt: { type: string, nullable: true }
        contentVersion: { type: integer, format: int64, minimum: 1 }
        replyCount: { type: integer }
        voteCount: { type: integer }
        hotScore: { type: number, nullable: true }
        status: { type: string, enum: [visible] }
        createdAt: { type: integer }
        lastActivityAt: { type: integer }
        tags: { type: array, items: { type: string } }
        attachments: { type: array, maxItems: 1, description: At most the first clean image for a bounded feed card., items: { $ref: "#/components/schemas/ForumAttachment" } }
        viewerVote: { type: string, enum: [up, down], nullable: true }
        isBookmarked: { type: boolean }
        canEdit: { type: boolean, description: Server-authoritative author edit permission for this viewer. }
        canDelete: { type: boolean, description: Server-authoritative author delete permission for this viewer. }
        canModerate: { type: boolean, description: Server-authoritative moderation permission including role hierarchy. }
    ThreadFeed:
      allOf: [{ $ref: "#/components/schemas/Thread" }, { type: object, properties: { unreadCount: { type: integer, nullable: true } } }]
    ThreadDetail:
      type: object
      required: [id, boardId, authorHandle, authorId, title, body, contentFormat, contentVersion, replyCount, voteCount, hotScore, tags, attachments, status, pinnedAt, pinnedGlobally, featuredAt, closedAt, archivedAt, deletedAt, editedAt, hiddenAt, createdAt, lastActivityAt, solvedAnswerId, viewerVote, isBookmarked, myLastReadCommentId, mySubscriptionLevel, poll, canEdit, canDelete, canModerate]
      properties:
        id: { type: string }
        boardId: { type: string }
        authorHandle: { type: string }
        authorId: { type: string }
        title: { type: string }
        body: { type: string, nullable: true }
        contentFormat: { $ref: "#/components/schemas/ContentFormat" }
        contentVersion: { type: integer, format: int64, minimum: 1 }
        replyCount: { type: integer }
        voteCount: { type: integer }
        hotScore: { type: number, nullable: true }
        tags: { type: array, items: { type: string } }
        attachments: { type: array, maxItems: 8, items: { $ref: "#/components/schemas/ForumAttachment" } }
        status: { type: string }
        pinnedAt: { type: integer, nullable: true }
        pinnedGlobally: { type: boolean }
        featuredAt: { type: integer, nullable: true }
        closedAt: { type: integer, nullable: true }
        archivedAt: { type: integer, nullable: true }
        deletedAt: { type: integer, nullable: true }
        editedAt: { type: integer, nullable: true }
        hiddenAt: { type: integer, nullable: true }
        createdAt: { type: integer }
        lastActivityAt: { type: integer }
        solvedAnswerId: { type: string, nullable: true }
        viewerVote: { type: string, enum: [up, down], nullable: true }
        isBookmarked: { type: boolean }
        myLastReadCommentId: { type: string, nullable: true }
        mySubscriptionLevel: { type: string, enum: [watching, tracking, muted], nullable: true }
        poll:
          allOf: [{ $ref: "#/components/schemas/Poll" }]
          nullable: true
        canEdit: { type: boolean, description: Server-authoritative author edit permission for this viewer. }
        canDelete: { type: boolean, description: Server-authoritative author delete permission for this viewer. }
        canModerate: { type: boolean, description: Server-authoritative moderation permission including role hierarchy. }
    ThreadInput:
      type: object
      required: [boardId, title]
      properties:
        boardId: { type: string }
        title: { type: string, minLength: 1, maxLength: 200 }
        body: { type: string, nullable: true, maxLength: 50000 }
        contentFormat: { $ref: "#/components/schemas/ContentFormat" }
        tags: { type: array, items: { type: string, minLength: 1, maxLength: 64 }, maxItems: 3, uniqueItems: true }
        attachmentAssetIds:
          type: array
          maxItems: 8
          uniqueItems: true
          description: Ordered asset ids that must exactly equal the markdown_v1 yourtj-asset image destinations. Must be empty for plain_v1.
          items: { type: string, pattern: '^[1-9][0-9]*$' }
        poll: { $ref: "#/components/schemas/PollInput" }
    ThreadUpdateInput:
      type: object
      properties:
        expectedVersion:
          type: integer
          format: int64
          minimum: 1
          default: 1
          description: Compare-and-swap version. Legacy omission is treated as version 1 and conflicts once content has changed.
        title: { type: string, minLength: 1, maxLength: 200 }
        body: { type: string, maxLength: 50000 }
        contentFormat:
          allOf: [{ $ref: "#/components/schemas/ContentFormat" }]
          description: Required whenever body is supplied; legacy omission is treated as plain_v1.
        tags: { type: array, items: { type: string, minLength: 1, maxLength: 64 }, maxItems: 3, uniqueItems: true }
        attachmentAssetIds:
          type: array
          maxItems: 8
          uniqueItems: true
          description: When body is supplied, ordered ids must exactly match every yourtj-asset image reference; otherwise omit or send an empty array.
          items: { type: string, pattern: '^[1-9][0-9]*$' }
    ThreadPinInput: { type: object, properties: { globally: { type: boolean } } }
    ThreadMoveInput: { type: object, required: [boardId], properties: { boardId: { type: string } } }
    AdminThreadActionInput:
      type: object
