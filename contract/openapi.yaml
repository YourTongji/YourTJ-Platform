        value: { type: string, maxLength: 20000 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AnnouncementReceipt:
      type: object
      required: [revision]
      properties:
        revision: { type: integer, minimum: 1 }
        firstSeenAt: { type: integer, nullable: true }
        dismissedAt: { type: integer, nullable: true }
        acknowledgedAt: { type: integer, nullable: true }
    AnnouncementReceiptSummary:
      type: object
      required: [seenCount, dismissedCount, acknowledgedCount]
      properties:
        seenCount: { type: integer, minimum: 0 }
        dismissedCount: { type: integer, minimum: 0 }
        acknowledgedCount: { type: integer, minimum: 0 }
    Announcement:
      type: object
      required: [id, title, status, effectiveState, presentation, severity, priority, audience, requiresAck, version, revision, createdAt, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string, nullable: true }
        status: { type: string, enum: [draft, scheduled, published, archived] }
        effectiveState: { type: string, enum: [draft, scheduled, active, expired, archived] }
        presentation: { type: string, enum: [card, banner] }
        severity: { type: string, enum: [info, success, warning, critical] }
        priority: { type: integer, minimum: -1000, maximum: 1000 }
        audience: { type: string, enum: [all, authenticated, staff] }
        requiresAck: { type: boolean }
        version: { type: integer, minimum: 1 }
        revision: { type: integer, minimum: 1 }
        startsAt: { type: integer, nullable: true }
        endsAt: { type: integer, nullable: true }
        publishedAt: { type: integer, nullable: true }
        archivedAt: { type: integer, nullable: true }
        createdAt: { type: integer }
        updatedAt: { type: integer }
        receipt:
          allOf: [{ $ref: "#/components/schemas/AnnouncementReceipt" }]
          nullable: true
        receiptSummary:
          allOf: [{ $ref: "#/components/schemas/AnnouncementReceiptSummary" }]
          nullable: true
    AnnouncementCreateInput:
      type: object
      required: [title, status, presentation, severity, priority, audience, requiresAck, reason]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        body: { type: string, nullable: true, maxLength: 20000 }
        status: { type: string, enum: [draft, scheduled, published] }
        presentation: { type: string, enum: [card, banner] }
        severity: { type: string, enum: [info, success, warning, critical] }
        priority: { type: integer, minimum: -1000, maximum: 1000 }
        audience: { type: string, enum: [all, authenticated, staff] }
        requiresAck: { type: boolean }
        startsAt: { type: integer, nullable: true }
        endsAt: { type: integer, nullable: true }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AnnouncementUpdateInput:
      allOf:
        - $ref: "#/components/schemas/AnnouncementCreateInput"
        - type: object
          required: [expectedVersion, bumpRevision]
          properties:
            expectedVersion: { type: integer, minimum: 1 }
            bumpRevision:
              type: boolean
              description: Re-present this update to users who already saw the current revision.
    AdminVersionedArchiveInput:
      type: object
      required: [expectedVersion, reason]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AnnouncementReceiptInput:
      type: object
      required: [revision, action]
      properties:
        revision: { type: integer, minimum: 1 }
        action: { type: string, enum: [seen, dismiss, acknowledge] }
    AnnouncementRevision:
      type: object
      required: [announcementId, version, revision, title, status, presentation, severity, priority, audience, requiresAck, createdAt]
      properties:
        announcementId: { type: string }
        version: { type: integer, minimum: 1 }
        revision: { type: integer, minimum: 1 }
        title: { type: string }
        body: { type: string, nullable: true }
        status: { type: string, enum: [draft, scheduled, published, archived] }
        presentation: { type: string, enum: [card, banner] }
        severity: { type: string, enum: [info, success, warning, critical] }
        priority: { type: integer }
        audience: { type: string, enum: [all, authenticated, staff] }
        requiresAck: { type: boolean }
        startsAt: { type: integer, nullable: true }
        endsAt: { type: integer, nullable: true }
        createdAt: { type: integer }
    Promotion:
      type: object
      required: [id, placement, title, targetUrl, status, effectiveState, priority, audience, version, createdAt, updatedAt, trackingToken, metrics]
      properties:
        id: { type: string }
        placement: { type: string, enum: [home-left-primary, home-left-secondary] }
        title: { type: string }
        body: { type: string, nullable: true }
        ctaLabel: { type: string, nullable: true }
        targetUrl: { type: string, description: Same-origin relative application path. }
        assetId: { type: string, nullable: true }
        status: { type: string, enum: [draft, scheduled, published, paused, archived] }
        effectiveState: { type: string, enum: [draft, scheduled, active, paused, expired, archived] }
        priority: { type: integer, minimum: -1000, maximum: 1000 }
        audience: { type: string, enum: [all, authenticated, staff] }
        version: { type: integer, minimum: 1 }
        startsAt: { type: integer, nullable: true }
        endsAt: { type: integer, nullable: true }
        archivedAt: { type: integer, nullable: true }
        createdAt: { type: integer }
        updatedAt: { type: integer }
        trackingToken:
          type: string
          nullable: true
          description: Short-lived anonymous presentation token returned only by the active public list.
        metrics:
          allOf: [{ $ref: "#/components/schemas/PromotionMetricSummary" }]
          nullable: true
          description: Rolling 30-day aggregate returned only by the administration list.
    PromotionMetricSummary:
      type: object
      additionalProperties: false
      required: [from, to, impressions, clicks]
      properties:
        from: { type: string, format: date }
        to: { type: string, format: date }
        impressions: { type: integer, minimum: 0 }
        clicks: { type: integer, minimum: 0 }
    PromotionMetricDay:
      type: object
      additionalProperties: false
      required: [metricDate, impressions, clicks]
      properties:
        metricDate: { type: string, format: date }
        impressions: { type: integer, minimum: 0 }
        clicks: { type: integer, minimum: 0 }
    PromotionMetrics:
      type: object
      additionalProperties: false
      required: [summary, days]
      properties:
        summary: { $ref: "#/components/schemas/PromotionMetricSummary" }
        days:
          type: array
          items: { $ref: "#/components/schemas/PromotionMetricDay" }
    PromotionEventInput:
      type: object
      additionalProperties: false
      required: [eventType, trackingToken]
      properties:
        eventType: { type: string, enum: [impression, click] }
        trackingToken: { type: string, minLength: 1, maxLength: 2048 }
    PromotionCreateInput:
      type: object
      required: [placement, title, targetUrl, status, priority, audience, reason]
      properties:
        placement: { type: string, enum: [home-left-primary, home-left-secondary] }
        title: { type: string, minLength: 1, maxLength: 120 }
        body: { type: string, nullable: true, maxLength: 500 }
        ctaLabel: { type: string, nullable: true, maxLength: 40 }
        targetUrl: { type: string, minLength: 1, maxLength: 2048, description: Same-origin relative application path. }
        assetId: { type: string, nullable: true }
        status: { type: string, enum: [draft, scheduled, published, paused] }
        priority: { type: integer, minimum: -1000, maximum: 1000 }
        audience: { type: string, enum: [all, authenticated, staff] }
        startsAt: { type: integer, nullable: true }
        endsAt: { type: integer, nullable: true }
        reason: { type: string, minLength: 3, maxLength: 500 }
    PromotionUpdateInput:
      allOf:
        - $ref: "#/components/schemas/PromotionCreateInput"
        - type: object
          required: [expectedVersion]
          properties:
            expectedVersion: { type: integer, minimum: 1 }
    AdminCourseCreateInput:
      type: object
      required: [code, name, reason]
      properties:
        code: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 200 }
        credit: { type: number, minimum: 0, maximum: 100 }
        department: { type: string, maxLength: 200 }
        teacherName: { type: string, maxLength: 200 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminCourseUpdateInput:
      type: object
      required: [reason]
      properties:
        code: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 200 }
        credit: { type: number, minimum: 0, maximum: 100 }
        department: { type: string, maxLength: 200 }
        teacherName: { type: string, maxLength: 200 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    # ---- typed pages ----
