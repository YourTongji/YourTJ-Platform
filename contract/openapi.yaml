openapi: 3.0.3
info:
  title: YourTJ v2 API
  version: 2.0.0
  description: >
    The single source of truth for the v2 HTTP contract. Client type bindings
    (TS / Swift / Dart) are generated from this file — change the API here first,
    then implement and regenerate. Conventions: bearer JWT auth; money/escrow
    writes use one-time signing intents and require `X-Wallet-Intent`,
    `X-Wallet-Sig`, and the same `Idempotency-Key`; cursor pagination on public
    lists; the error envelope `{ error: { code, message } }`; timestamps are Unix seconds.
servers:
  - url: https://api.yourtj.de/api/v2

tags:
  - { name: auth }
  - { name: identity }
  - { name: activity }
  - { name: wallet }
  - { name: credit }
  - { name: search }
  - { name: courses }
  - { name: selection, description: 选课 (PK) catalogue mirrored from 一系统 }
  - { name: reviews }
  - { name: forum }
  - { name: notifications }
  - { name: platform }
  - { name: media }
  - { name: admin }

security:
  - bearer: []

components:
  securitySchemes:
    bearer: { type: http, scheme: bearer, bearerFormat: JWT }

  parameters:
    Cursor: { name: cursor, in: query, schema: { type: string }, description: Opaque pagination cursor }
    Limit: { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
    WalletIntent:
      name: X-Wallet-Intent
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: One-time signing intent returned by POST /credit/signing-intents
    WalletSig:
      name: X-Wallet-Sig
      in: header
      required: true
      schema: { type: string }
      description: Base64 Ed25519 signature over the intent's exact signingBytes
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 128 }
    WalletIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }

  responses:
    BadRequest:   { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Unauthorized: { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Forbidden:    { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    NotFound:     { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Conflict:     { description: Conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    RateLimited:  { description: Too many requests, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    ServiceUnavailable: { description: Upstream service unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
    Page:
      type: object
      description: Base cursor-pagination envelope; typed lists override `items`.
      properties:
        items: { type: array, items: { type: object } }
        nextCursor: { type: string, nullable: true }
        hasMore: { type: boolean }

    # ---- identity ----
    Account:
      type: object
      properties:
        id: { type: string }
        handle: { type: string }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, mod, admin] }
        capabilities:
          type: array
          items: { type: string }
        trustLevel: { type: integer }
        createdAt: { type: integer }
    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        account: { $ref: "#/components/schemas/Account" }

    # ---- courses / reviews ----
    Department: { type: object, properties: { id: { type: string }, name: { type: string } } }
    Teacher:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        title: { type: string, nullable: true }
        department: { type: string, nullable: true }
    Course:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        credit: { type: number, nullable: true }
        department: { type: string, nullable: true }
        teacherName: { type: string, nullable: true }
        reviewCount: { type: integer }
        reviewAvg: { type: number, nullable: true }
    CourseDetail:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            teachers: { type: array, items: { $ref: "#/components/schemas/Teacher" } }
            aliases: { type: array, items: { type: string } }
    Review:
      type: object
      properties:
        id: { type: string }
        courseId: { type: string }
        rating: { type: integer }
        comment: { type: string, nullable: true }
        score: { type: string, nullable: true }
        semester: { type: string, nullable: true }
        authorHandle: { type: string }
        authorAvatar: { type: string, nullable: true }
        approveCount: { type: integer }
        status: { type: string, enum: [visible, hidden, pending] }
        createdAt: { type: integer }
    ReviewInput:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 0, maximum: 5 }
        comment: { type: string }
        semester: { type: string }
        score: { type: string }
    CreateReviewInput:
      allOf:
        - $ref: "#/components/schemas/ReviewInput"
        - type: object
          required: [captchaToken]
          properties:
            captchaToken: { type: string, minLength: 1 }
    AiSummary:
      type: object
      properties:
        courseId: { type: string }
        summary: { type: string }
        model: { type: string }
        updatedAt: { type: integer }
    Report:
      type: object
      required: [id, reviewId, reason, status, createdAt]
      properties:
        id: { type: string }
        reviewId: { type: string }
        reason: { type: string }
        status: { type: string, enum: [open, upheld, rejected, ignored] }
        courseId: { type: string, nullable: true }
        reviewAuthorHandle: { type: string, nullable: true }
        reviewRating: { type: integer, minimum: 0, maximum: 5, nullable: true }
        reviewStatus: { type: string, enum: [visible, hidden, pending], nullable: true }
        reviewExcerpt: { type: string, nullable: true }
        createdAt: { type: integer }
    ReviewReportResolutionInput:
      type: object
      required: [action, note]
      properties:
        action: { type: string, enum: [uphold, reject, ignore] }
        note: { type: string, minLength: 3, maxLength: 1000 }

    # ---- wallet / credit (Web2.5) ----
    Wallet: { type: object, properties: { accountId: { type: string }, balance: { type: integer } } }
    LedgerEntry:
      type: object
      properties:
        seq: { type: integer }
        txId: { type: string }
        type: { type: string, enum: [mint, tip, escrow_hold, escrow_release, admin_adjust] }
        fromAccount: { type: string, nullable: true }
        toAccount: { type: string, nullable: true }
        amount: { type: integer }
        hash: { type: string }
        createdAt: { type: integer }
    LedgerVerify:
      type: object
      properties:
        ok: { type: boolean }
        latestSeq: { type: integer }
        latestHash: { type: string }
    SigningIntentInput:
      type: object
      required: [action, request]
      properties:
        action:
          type: string
          enum: [credit.tip, credit.task.create, credit.task.action, credit.product.purchase, credit.purchase.action]
        request: { type: object }
    SigningIntent:
      type: object
      required: [intentId, signingBytes, expiresAt]
      properties:
        intentId: { type: string, format: uuid }
        signingBytes: { type: string }
        expiresAt: { type: integer, format: int64 }
    TipInput:
      type: object
      required: [toAccountId, amount, targetType, targetId]
      properties:
        toAccountId: { type: string }
        amount: { type: integer, minimum: 1 }
        targetType: { type: string, enum: [review, thread, comment] }
        targetId: { type: string }
    Task:
      type: object
      properties:
        id: { type: string }
        creatorId: { type: string }
        acceptorId: { type: string, nullable: true }
        title: { type: string }
        description: { type: string, nullable: true }
        rewardAmount: { type: integer }
        contactInfo: { type: string, nullable: true, description: Visible only to controlled parties }
        status: { type: string, enum: [open, in_progress, submitted, completed, cancelled] }
        createdAt: { type: integer }
    TaskInput:
      type: object
      required: [title, rewardAmount]
      properties:
        title: { type: string }
        description: { type: string }
        rewardAmount: { type: integer, minimum: 1 }
        contactInfo: { type: string }
    TaskAction:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [submit, confirm, cancel, reject, delete] }
    Product:
      type: object
      properties:
        id: { type: string }
        sellerId: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        price: { type: integer }
        stock: { type: integer }
        status: { type: string, enum: [on_sale, off_sale, sold_out] }
        createdAt: { type: integer }
    ProductInput:
      type: object
      required: [title, price, stock]
      properties:
        title: { type: string }
        description: { type: string }
        price: { type: integer, minimum: 1 }
        stock: { type: integer, minimum: 0 }
        deliveryInfo: { type: string }
    Purchase:
      type: object
      properties:
        id: { type: string }
        productId: { type: string }
        buyerId: { type: string }
        sellerId: { type: string }
        amount: { type: integer }
        status: { type: string, enum: [pending, accepted, delivered, completed, cancelled] }
        createdAt: { type: integer }
    PurchaseAction:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [accept, deliver, confirm] }

    # ---- search ----
    SearchResult:
      type: object
      properties:
        courses: { type: array, items: { $ref: "#/components/schemas/Course" } }
        reviews: { type: array, items: { $ref: "#/components/schemas/Review" } }

    # ---- selection (选课/PK) ----
    Calendar: { type: object, properties: { id: { type: string }, name: { type: string }, isCurrent: { type: boolean } } }
    Campus: { type: object, properties: { id: { type: string }, name: { type: string } } }
    Faculty: { type: object, properties: { id: { type: string }, name: { type: string }, campusId: { type: string, nullable: true } } }
    Major:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        facultyId: { type: string, nullable: true }
        grade: { type: string, nullable: true }
    CourseNature: { type: object, properties: { id: { type: string }, name: { type: string } } }
    SelectionCourse:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        credit: { type: number }
        natureId: { type: string, nullable: true }
        campus: { type: string, nullable: true }
        teacherName: { type: string, nullable: true }
    TimeSlot:
      type: object
      properties:
        courseId: { type: string }
        teacherName: { type: string, nullable: true }
        weekday: { type: integer }
        startSlot: { type: integer }
        endSlot: { type: integer }
        weeks: { type: string }
        location: { type: string, nullable: true }
    LatestUpdate: { type: object, properties: { source: { type: string }, fetchedAt: { type: integer } } }

    # ---- forum (F1) ----
    Board: { type: object, properties: { id: { type: string }, slug: { type: string }, name: { type: string }, parentId: { type: string, nullable: true }, description: { type: string, nullable: true }, position: { type: integer }, isLocked: { type: boolean }, minTrustToPost: { type: integer }, threadCount: { type: integer } } }
    Tag: { type: object, properties: { id: { type: string }, slug: { type: string }, name: { type: string }, description: { type: string, nullable: true }, threadCount: { type: integer }, createdAt: { type: integer } } }
    Thread:
      type: object
      properties:
        id: { type: string }
        boardId: { type: string }
        authorHandle: { type: string }
        title: { type: string }
        replyCount: { type: integer }
        voteCount: { type: integer }
        hotScore: { type: number }
        createdAt: { type: integer }
        lastActivityAt: { type: integer }
        tags: { type: array, items: { type: string } }
    ThreadFeed:
      allOf: [{ $ref: "#/components/schemas/Thread" }, { type: object, properties: { status: { type: string }, unreadCount: { type: integer, nullable: true } } }]
    ThreadDetail:
      type: object
      required: [id, boardId, authorHandle, authorId, title, body, replyCount, voteCount, hotScore, tags, status, pinnedAt, pinnedGlobally, featuredAt, closedAt, archivedAt, deletedAt, editedAt, hiddenAt, createdAt, lastActivityAt, solvedAnswerId, myLastReadCommentId, mySubscriptionLevel, poll]
      properties:
        id: { type: string }
        boardId: { type: string }
        authorHandle: { type: string }
        authorId: { type: string }
        title: { type: string }
        body: { type: string, nullable: true }
        replyCount: { type: integer }
        voteCount: { type: integer }
        hotScore: { type: number, nullable: true }
        tags: { type: array, items: { type: string } }
        status: { type: string }
        pinnedAt: { type: integer, nullable: true }
        pinnedGlobally: { type: boolean }
        featuredAt: { type: integer, nullable: true }
        closedAt: { type: integer, nullable: true }
        archivedAt: { type: integer, nullable: true }
        deletedAt: { type: integer, nullable: true }
        editedAt: { type: integer, nullable: true }
        hiddenAt: { type: integer, nullable: true }
        createdAt: { type: integer }
        lastActivityAt: { type: integer }
        solvedAnswerId: { type: string, nullable: true }
        myLastReadCommentId: { type: string, nullable: true }
        mySubscriptionLevel: { type: string, nullable: true }
        poll:
          allOf: [{ $ref: "#/components/schemas/Poll" }]
          nullable: true
    ThreadInput:
      type: object
      required: [boardId, title]
      properties:
        boardId: { type: string }
        title: { type: string, minLength: 1, maxLength: 200 }
        body: { type: string, nullable: true, maxLength: 50000 }
        tags: { type: array, items: { type: string, minLength: 1, maxLength: 64 }, maxItems: 3 }
        poll: { $ref: "#/components/schemas/PollInput" }
    ThreadUpdateInput: { type: object, properties: { title: { type: string }, body: { type: string }, tags: { type: array, items: { type: string }, maxItems: 3 } } }
    ThreadPinInput: { type: object, properties: { globally: { type: boolean } } }
    ThreadMoveInput: { type: object, required: [boardId], properties: { boardId: { type: string } } }
    AdminThreadActionInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
        globally: { type: boolean }
        boardId: { type: string }
    AdminCommentActionInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
    PostRevision: { type: object, properties: { id: { type: string }, seq: { type: integer }, editorId: { type: string }, oldTitle: { type: string, nullable: true }, oldBody: { type: string }, createdAt: { type: integer } } }
    Comment:
      type: object
      required: [id, threadId, parentId, path, authorHandle, authorId, body, voteCount, isDeleted, isHidden, editedAt, createdAt, quotedCommentId, isSolved]
      properties:
        id: { type: string }
        threadId: { type: string }
        parentId: { type: string, nullable: true }
        path: { type: string }
        authorHandle: { type: string }
        authorId: { type: string }
        body: { type: string }
        voteCount: { type: integer }
        isDeleted: { type: boolean }
        isHidden: { type: boolean }
        editedAt: { type: integer, nullable: true }
        createdAt: { type: integer }
        quotedCommentId: { type: string, nullable: true }
        isSolved: { type: boolean }
    CommentInput: { type: object, required: [body], properties: { parentId: { type: string }, body: { type: string }, quotedCommentId: { type: string } } }
    CommentUpdateInput: { type: object, required: [body], properties: { body: { type: string } } }
    VoteInput:
      type: object
      required: [value, postType]
      properties:
        value: { type: string, enum: [up, down] }
        postType: { type: string, enum: [thread, comment] }
    VoteResponse:
      type: object
      required: [ok, voteCount]
      properties:
        ok: { type: boolean }
        voteCount: { type: integer }
    FlagInput:
      type: object
      required: [reason, postType]
      properties:
        reason: { type: string, enum: [spam, abuse, off_topic, illegal, other] }
        note: { type: string, maxLength: 1000 }
        postType: { type: string, enum: [thread, comment] }
    FlagResponse:
      type: object
      required: [ok, autoHidden, autoSilenced]
      properties:
        ok: { type: boolean }
        autoHidden: { type: boolean }
        autoSilenced: { type: boolean }
    FlagResolveInput:
      type: object
      required: [action, note]
      properties:
        action: { type: string, enum: [uphold, reject, ignore] }
        note: { type: string, minLength: 3, maxLength: 500 }
    Subscription: { type: object, properties: { targetType: { type: string, enum: [board, thread] }, targetId: { type: string }, level: { type: string, enum: [watching, tracking, muted] }, createdAt: { type: integer } } }
    SubscriptionInput: { type: object, required: [targetType, targetId, level], properties: { targetType: { type: string, enum: [board, thread] }, targetId: { type: string }, level: { type: string, enum: [watching, tracking, muted] } } }
    UnsubscribeInput: { type: object, required: [targetType, targetId], properties: { targetType: { type: string, enum: [board, thread] }, targetId: { type: string } } }
    Bookmark: { type: object, properties: { targetType: { type: string }, targetId: { type: string }, note: { type: string, nullable: true }, createdAt: { type: integer } } }
    BookmarkInput: { type: object, properties: { note: { type: string } } }
    ModAction: { type: object, properties: { id: { type: string }, actorId: { type: string }, action: { type: string }, targetType: { type: string }, targetId: { type: string }, reason: { type: string, nullable: true }, createdAt: { type: integer } } }
    Notification:
      type: object
      required: [id, type, payload, targetUrl, read, readAt, createdAt]
      properties:
        id: { type: string }
        type: { type: string }
        payload: { type: object, additionalProperties: true }
        targetUrl:
          type: string
          nullable: true
          description: Safe application-relative destination when this notification has one.
        read: { type: boolean }
        readAt: { type: integer, nullable: true }
        createdAt: { type: integer }
    NotificationReadInput:
      type: object
      properties:
        ids:
          type: array
          minItems: 1
          maxItems: 100
          items: { type: string }
          description: Mark only these notifications. They must belong to the current account.
        all:
          type: boolean
          description: Mark every notification for the current account. Cannot be combined with ids.
    NotificationPrefs: { type: object, properties: { prefs: { type: object } } }
    NotificationPrefsInput: { type: object, required: [prefs], properties: { prefs: { type: object } } }
    ReadTrackingInput: { type: object, properties: { lastReadCommentId: { type: string, nullable: true } } }
    Sanction: { type: object, properties: { id: { type: string }, accountId: { type: string }, kind: { type: string, enum: [silence, suspend] }, reason: { type: string }, issuedBy: { type: string, nullable: true }, startsAt: { type: integer }, endsAt: { type: integer, nullable: true }, revokedAt: { type: integer, nullable: true }, createdAt: { type: integer } } }
    SanctionInput: { type: object, required: [reason], properties: { reason: { type: string, minLength: 3, maxLength: 500 }, endsAt: { type: integer, nullable: true } } }
    UnsanctionInput:
      type: object
      required: [sanctionId, reason]
      properties:
        sanctionId: { type: string }
        reason: { type: string, minLength: 3, maxLength: 500 }
    WatchedWord: { type: object, properties: { id: { type: string }, word: { type: string }, action: { type: string, enum: [block, censor, queue] }, createdAt: { type: integer } } }
    AdminBoardCreateInput:
      type: object
      required: [slug, name, reason]
      properties:
        slug: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 100 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminBoardUpdateInput:
      type: object
      required: [reason]
      properties:
        slug: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 100 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminTagCreateInput:
      type: object
      required: [slug, name, reason]
      properties:
        slug: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 500 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminTagUpdateInput:
      type: object
      required: [reason]
      properties:
        slug: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 500 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    WatchedWordInput:
      type: object
      required: [word, action, reason]
      properties:
        word: { type: string, minLength: 1, maxLength: 200 }
        action: { type: string, enum: [block, censor, queue] }
        reason: { type: string, minLength: 3, maxLength: 500 }

    # ---- platform / admin ----
    Setting: { type: object, properties: { key: { type: string }, value: { type: string } } }
    SettingUpdateInput:
      type: object
      required: [value, reason]
      properties:
        value: { type: string, maxLength: 20000 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    Announcement:
      type: object
      required: [id, title, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string, nullable: true }
        createdAt: { type: integer }
    AnnouncementInput:
      type: object
      required: [title, reason]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        body: { type: string, nullable: true, maxLength: 20000 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminCourseCreateInput:
      type: object
      required: [code, name, reason]
      properties:
        code: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 200 }
        credit: { type: number, minimum: 0, maximum: 100 }
        department: { type: string, maxLength: 200 }
        teacherName: { type: string, maxLength: 200 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminCourseUpdateInput:
      type: object
      required: [reason]
      properties:
        code: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 200 }
        credit: { type: number, minimum: 0, maximum: 100 }
        department: { type: string, maxLength: 200 }
        teacherName: { type: string, maxLength: 200 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    # ---- typed pages ----
    CoursePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Course" } } } }
    ReviewPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Review" } } } }
    ThreadPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Thread" } } } }
    CommentPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Comment" } } } }
    NotificationPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Notification" } } } }
    TaskPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Task" } } } }
    ProductPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Product" } } } }
    PurchasePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Purchase" } } } }
    LedgerPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/LedgerEntry" } } } }
    ReportPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Report" } } } }
    ThreadFeedPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/ThreadFeed" } } } }
    UserThreadPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/UserThread" } } } }
    UserCommentPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/UserComment" } } } }
    RevisionPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/PostRevision" } } } }
    ModActionPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/ModAction" } } } }

    # ---- forum: DM ----
    DmConversation:
      type: object
      required: [id, participantId, participantHandle, unreadCount, createdAt]
      properties:
        id: { type: string }
        participantId: { type: string }
        participantHandle: { type: string }
        participantAvatarUrl: { type: string, nullable: true }
        lastMessageExcerpt: { type: string, nullable: true }
        lastMessageAt: { type: integer, nullable: true }
        unreadCount: { type: integer, minimum: 0 }
        createdAt: { type: integer }
    DmConversationInput:
      type: object
      required: [recipientHandle]
      properties:
        recipientHandle: { type: string, minLength: 3, maxLength: 30 }
    DmMessage:
      type: object
      required: [id, conversationId, senderId, senderHandle, body, createdAt]
      properties:
        id: { type: string }
        conversationId: { type: string }
        senderId: { type: string }
        senderHandle: { type: string }
        body: { type: string }
        createdAt: { type: integer }
    DmMessageInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 16000 }
    DmReadInput:
      type: object
      properties:
        lastReadMessageId: { type: string, nullable: true }
    DmReportInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, enum: [spam, abuse, harassment, fraud, illegal, other] }
        note: { type: string, maxLength: 1000 }
    DmReport:
      type: object
      required: [id, messageId, conversationId, reporterId, senderId, reason, status, createdAt]
      properties:
        id: { type: string }
        messageId: { type: string }
        conversationId: { type: string }
        reporterId: { type: string }
        reporterHandle: { type: string }
        senderId: { type: string }
        senderHandle: { type: string }
        messageExcerpt: { type: string }
        reason: { type: string, enum: [spam, abuse, harassment, fraud, illegal, other] }
        note: { type: string, nullable: true }
        status: { type: string, enum: [open, upheld, rejected] }
        handledBy: { type: string, nullable: true }
        handledAt: { type: integer, nullable: true }
        createdAt: { type: integer }
    DmReportResolutionInput:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [uphold, reject] }
        note: { type: string, maxLength: 1000 }
    # ---- forum: polls ----
    PollInput:
      type: object
      required: [question, options]
      properties:
        question: { type: string, minLength: 1, maxLength: 500 }
        multiSelect: { type: boolean, default: false }
        closesAt: { type: integer, nullable: true }
        options:
          type: array
          minItems: 2
          maxItems: 20
          items: { type: string, minLength: 1, maxLength: 200 }
    PollOption:
      type: object
      required: [id, label, voteCount, position]
      properties:
        id: { type: string }
        label: { type: string }
        voteCount: { type: integer, minimum: 0 }
        position: { type: integer, minimum: 0 }
    Poll:
      type: object
      required: [id, question, multiSelect, closesAt, options, myVotes]
      properties:
        id: { type: string }
        question: { type: string }
        multiSelect: { type: boolean }
        closesAt: { type: integer, nullable: true }
        options:
          type: array
          items: { $ref: "#/components/schemas/PollOption" }
        myVotes: { type: array, items: { type: string } }
    PollVoteResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
    # ---- identity: drafts ----
    DraftOutput:
      type: object
      properties:
        draftKey: { type: string }
        payload: { type: object }
        updatedAt: { type: integer }
    DraftPayload:
      type: object
      required: [draftKey, payload]
      properties:
        draftKey: { type: string }
        payload: { type: object }
    # ---- identity: ignores ----
    IgnoreUser:
      type: object
      properties:
        accountId: { type: string }
        handle: { type: string }
        avatarUrl: { type: string, nullable: true }
        createdAt: { type: integer }
    # ---- identity: public profile ----
    UserBadge:
      type: object
      required: [slug, name]
      properties:
        slug: { type: string }
        name: { type: string }
    UserProfile:
      type: object
      required: [id, handle, role, trustLevel, badges, threadCount, commentCount, votesReceived, createdAt]
      properties:
        id: { type: string }
        handle: { type: string }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, mod, admin] }
        trustLevel: { type: integer, minimum: 0 }
        badges: { type: array, items: { $ref: "#/components/schemas/UserBadge" } }
        threadCount: { type: integer, minimum: 0 }
        commentCount: { type: integer, minimum: 0 }
        votesReceived: { type: integer, minimum: 0 }
        createdAt: { type: integer }
    UserThread:
      type: object
      required: [id, title, boardSlug, replyCount, voteCount, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        boardSlug: { type: string }
        replyCount: { type: integer, minimum: 0 }
        voteCount: { type: integer }
        createdAt: { type: integer }
    UserComment:
      type: object
      required: [id, threadId, threadTitle, body, createdAt]
      properties:
        id: { type: string }
        threadId: { type: string }
        threadTitle: { type: string }
        body: { type: string }
        createdAt: { type: integer }
    UserProfileWithStats:
      allOf: [{ $ref: "#/components/schemas/UserProfile" }]
      deprecated: true
    # ---- activity ----
    ActivityWeights:
      type: object
      required: [thread, comment, like]
      properties:
        thread: { type: integer, minimum: 0, maximum: 1000 }
        comment: { type: integer, minimum: 0, maximum: 1000 }
        like: { type: integer, minimum: 0, maximum: 1000 }
    ActivityDay:
      type: object
      required: [date, threads, comments, likes, score]
      properties:
        date: { type: string, format: date }
        threads: { type: integer, minimum: 0 }
        comments: { type: integer, minimum: 0 }
        likes: { type: integer, minimum: 0, description: Positive likes given by the user. }
        score: { type: integer, minimum: 0 }
    ActivityCalendar:
      type: object
      description: A continuous Asia/Shanghai calendar; days without activity are returned with zero counts.
      required: [timezone, from, to, policyVersion, weights, days]
      properties:
        timezone: { type: string, enum: [Asia/Shanghai] }
        from: { type: string, format: date }
        to: { type: string, format: date }
        policyVersion: { type: integer, minimum: 1 }
        weights: { $ref: "#/components/schemas/ActivityWeights" }
        days: { type: array, items: { $ref: "#/components/schemas/ActivityDay" } }
    ActivityPolicy:
      type: object
      required: [version, timezone, weights, reason, changedBy, createdAt]
      properties:
        version: { type: integer, minimum: 1 }
        timezone: { type: string, enum: [Asia/Shanghai] }
        weights: { $ref: "#/components/schemas/ActivityWeights" }
        reason: { type: string }
        changedBy: { type: string }
        createdAt: { type: integer }
    ActivityPolicyUpdateInput:
      type: object
      required: [expectedVersion, weights, reason]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        weights: { $ref: "#/components/schemas/ActivityWeights" }
        reason: { type: string, minLength: 3, maxLength: 500 }
    # ---- platform ----
    OneboxResult:
      type: object
      properties:
        url: { type: string }
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image: { type: string, nullable: true }
        siteName: { type: string, nullable: true }
    # ---- media ----
    UploadIntentInput:
      type: object
      required: [kind, contentType]
      properties:
        kind: { type: string, enum: [image, file] }
        contentType: { type: string }
    UploadCredentials:
      type: object
      required: [uploadIntentId, accessKeyId, accessKeySecret, securityToken, region, bucket, prefix, ossKey, callbackUrl, callbackBody, expiration]
      properties:
        uploadIntentId: { type: string, format: uuid }
        accessKeyId: { type: string }
        accessKeySecret: { type: string }
        securityToken: { type: string }
        region: { type: string }
        bucket: { type: string }
        prefix: { type: string }
        ossKey: { type: string }
        callbackUrl: { type: string, format: uri }
        callbackBody: { type: string }
        expiration: { type: integer, description: Unix seconds }
    Upload:
      type: object
      properties:
        id: { type: string }
        accountId: { type: string }
        kind: { type: string, enum: [image, file] }
        ossKey: { type: string }
        url: { type: string }
        bytes: { type: integer }
        mime: { type: string }
        sha256: { type: string }
        status: { type: string, enum: [pending, clean, blocked] }
        createdAt: { type: integer }
    UploadUrl:
      type: object
      required: [url]
      properties:
        url: { type: string }
    UploadPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Upload" } } } }
    AdminForumFlagPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AdminForumFlag" } } } }

    # ---- admin ----
    AdminUser:
      type: object
      required: [id, handle, role, status, trustLevel, createdAt]
      properties:
        id: { type: string }
        handle: { type: string }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, mod, admin] }
        status: { type: string, enum: [active, suspended, deleted] }
        trustLevel: { type: integer, minimum: 0 }
        lastActiveAt: { type: integer, nullable: true }
        createdAt: { type: integer }
    AdminUserInviteInput:
      type: object
      required: [email, handle, reason]
      properties:
        email: { type: string, format: email }
        handle: { type: string, minLength: 3, maxLength: 30 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminReasonInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminForumFlag:
      type: object
      required: [id, targetType, targetId, reporterId, reason, weight, status, createdAt]
      properties:
        id: { type: string }
        targetType: { type: string, enum: [thread, comment] }
        targetId: { type: string }
        reporterId: { type: string }
        reason: { type: string, enum: [spam, abuse, off_topic, illegal, other] }
        note: { type: string, nullable: true }
        weight: { type: number }
        status: { type: string, enum: [open, upheld, rejected, ignored] }
        handledBy: { type: string, nullable: true }
        handledAt: { type: integer, nullable: true }
        resolutionNote: { type: string, nullable: true }
        authorHandle: { type: string, nullable: true }
        targetTitle: { type: string, nullable: true }
        contentExcerpt: { type: string, nullable: true }
        createdAt: { type: integer }
    AdminUserRoleInput:
      type: object
      required: [role, reason]
      properties:
        role: { type: string, enum: [user, mod] }
        reason: { type: string, minLength: 3, maxLength: 500 }
    AdminOverview:
      type: object
      required: [totalUsers, activeUsers, suspendedUsers, pendingReviewReports, pendingForumFlags, pendingDmReports, pendingMediaUploads, threadsToday, commentsToday, likesToday]
      properties:
        totalUsers: { type: integer, minimum: 0 }
        activeUsers: { type: integer, minimum: 0 }
        suspendedUsers: { type: integer, minimum: 0 }
        moderators: { type: integer, minimum: 0 }
        administrators: { type: integer, minimum: 0 }
        pendingReviewReports: { type: integer, minimum: 0 }
        pendingForumFlags: { type: integer, minimum: 0 }
        pendingDmReports: { type: integer, minimum: 0 }
        pendingMediaUploads: { type: integer, minimum: 0 }
        threadsToday: { type: integer, minimum: 0 }
        commentsToday: { type: integer, minimum: 0 }
        likesToday: { type: integer, minimum: 0 }
    AdminAuditEvent:
      type: object
      required: [id, actorKind, action, targetType, targetId, createdAt]
      properties:
        id: { type: string }
        actorKind: { type: string, enum: [account, system, service] }
        actorId: { type: string, nullable: true }
        actorHandle: { type: string, nullable: true }
        actorRole: { type: string, nullable: true }
        action: { type: string }
        targetType: { type: string }
        targetId: { type: string }
        reason: { type: string, nullable: true }
        metadata: { type: object, nullable: true }
        createdAt: { type: integer }
    Badge:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        iconUrl: { type: string, nullable: true }
        mintAmount: { type: integer, minimum: 0 }
        createdAt: { type: integer }
    BadgeInput:
      type: object
      required: [slug, name, reason]
      properties:
        slug: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 500 }
        iconUrl: { type: string, maxLength: 2000 }
        mintAmount: { type: integer, minimum: 0, maximum: 100000, default: 0 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    FeatureThreadInput:
      type: object
      required: [featured, reason]
      properties:
        featured: { type: boolean }
        reason: { type: string, minLength: 3, maxLength: 500 }
    FeaturedThreadResponse:
      type: object
      properties:
        id: { type: string }
        featuredAt: { type: integer }
    # ---- typed pages (cont.) ----
    DmConversationPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DmConversation" } } } }
    DmMessagePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DmMessage" } } } }
    DraftPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DraftOutput" } } } }
    IgnorePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/IgnoreUser" } } } }
    BadgePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Badge" } } } }
    ActivityPolicyPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/ActivityPolicy" } } } }
    AdminUserPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AdminUser" } } } }
    AdminAuditEventPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/AdminAuditEvent" } } } }
    DmReportPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/DmReport" } } } }
    AnnouncementPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Announcement" } } } }

paths:
  # ============ auth & identity ============
  /auth/email/request-code:
    post:
      tags: [auth]
      security: []
      summary: Send a verification code to a @tongji.edu.cn address
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [email, captchaToken], properties: { email: { type: string, format: email }, captchaToken: { type: string, minLength: 1 } } } } }
      responses:
        "204": { description: sent }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /auth/email/verify:
    post:
      tags: [auth]
      security: []
      summary: Verify a code and log in / register
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [email, code], properties: { email: { type: string }, code: { type: string }, handle: { type: string } } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthTokens" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /auth/refresh:
    post:
      tags: [auth]
      security: []
      summary: Exchange a refresh token for new tokens
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthTokens" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current session
      responses: { "204": { description: ok } }
  /me:
    get:
      tags: [identity]
      summary: Current account
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Account" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [identity]
      summary: Update handle / avatar
      requestBody:
        content: { application/json: { schema: { type: object, properties: { handle: { type: string }, avatarUrl: { type: string } } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Account" } } } }
  /me/activity:
    get:
      tags: [activity]
      summary: Current user's daily public activity calendar
      description: Returns every Asia/Shanghai calendar day in the requested inclusive range, including zero-count days. The maximum range is 371 days.
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ActivityCalendar" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /me/drafts:
    get:
      tags: [identity]
      summary: List my drafts
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/DraftPage" } } } } }
    put:
      tags: [identity]
      summary: Save a draft
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/DraftPayload" } } } }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/DraftOutput" } } } } }
  /me/drafts/{draft_key}:
    get:
      tags: [identity]
      summary: Get a draft by key
      parameters: [{ name: draft_key, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/DraftOutput" } } } } }
    delete:
      tags: [identity]
      summary: Delete a draft
      parameters: [{ name: draft_key, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: deleted } }
  /me/ignores/{account_id}:
    put:
      tags: [identity]
      summary: Ignore a user
      parameters: [{ name: account_id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: ok } }
    delete:
      tags: [identity]
      summary: Unignore a user
      parameters: [{ name: account_id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: ok } }
  /me/ignores:
    get:
      tags: [identity]
      summary: List ignored users
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/IgnorePage" } } } } }
  /users/{handle}:
    get:
      tags: [identity]
      security: []
      summary: Public user profile
      parameters: [{ name: handle, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/UserProfile" } } } } }
  /users/{handle}/threads:
    get:
      tags: [identity]
      security: []
      summary: User's threads
      parameters: [{ name: handle, in: path, required: true, schema: { type: string } }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/UserThreadPage" } } } } }
  /users/{handle}/comments:
    get:
      tags: [identity]
      security: []
      summary: User's comments
      parameters: [{ name: handle, in: path, required: true, schema: { type: string } }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/UserCommentPage" } } } } }

  # ============ wallet (bind / claim / ledger) ============
  /wallet:
    get:
      tags: [wallet]
      summary: Balance
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Wallet" } } } } }
  /wallet/bind:
    post:
      tags: [wallet]
      summary: Bind a client-generated Ed25519 public key
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [publicKey], properties: { publicKey: { type: string } } } } }
      responses: { "204": { description: ok } }
  /wallet/claim-challenge:
    get:
      tags: [wallet]
      summary: Get a one-time claim challenge
      responses: { "200": { description: ok, content: { application/json: { schema: { type: object, properties: { challengeId: { type: string }, nonce: { type: string } } } } } } }
  /wallet/claim:
    post:
      tags: [wallet]
      summary: Claim a legacy wallet by signing the challenge (re-derive userHash from 学号+PIN)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [legacyUserHash, challengeId, signature], properties: { legacyUserHash: { type: string }, challengeId: { type: string }, signature: { type: string } } } } }
      responses:
