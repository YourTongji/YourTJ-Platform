    post: { tags: [forum], summary: Flag post, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FlagInput" } } } }, responses: { "200": { description: queued, content: { application/json: { schema: { $ref: "#/components/schemas/FlagResponse" } } } } } }
  /forum/posts/{id}/bookmark:
    put: { tags: [forum], summary: Bookmark, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BookmarkInput" } } } }, responses: { "204": { description: ok } } }
    delete:
