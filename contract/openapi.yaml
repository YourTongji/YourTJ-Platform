    delete: { tags: [forum], summary: Soft-delete comment, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: deleted, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } } } }
