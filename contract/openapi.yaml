    get:
      tags: [forum]
      summary: List unread threads
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ThreadFeedPage" } } } } }
  /forum/comments/{id}/solve:
    post:
      tags: [forum]
      summary: Mark comment as solved answer (Q&A boards, thread author or mod)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: ok } }
    delete:
      tags: [forum]
      summary: Unmark solved answer
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: ok } }
  /forum/dm/conversations:
    get:
      tags: [forum]
      summary: List DM conversations
      parameters:
        - { name: view, in: query, schema: { type: string, enum: [inbox, requests, sent, archived, deleted], default: inbox } }
        - { name: q, in: query, schema: { type: string, minLength: 2, maxLength: 100 } }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/DmConversationPage" } } } } }
    post:
      tags: [forum]
      summary: Create or get a direct conversation or bounded message request
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string, minLength: 1, maxLength: 128 } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/DmConversationInput" } } } }
      responses:
        "200": { description: direct conversation or pending request, content: { application/json: { schema: { $ref: "#/components/schemas/DmConversation" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/RateLimited" }
