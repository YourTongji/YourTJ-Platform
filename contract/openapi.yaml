      responses: { "204": { description: removed or already absent } }
  /forum/bookmarks: { get: { tags: [forum], summary: List bookmarks, parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }], responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Page" } } } } } } }
