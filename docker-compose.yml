# YourTJ Platform — local development services
#
# Start all services:
#   docker compose up -d
#
# Stop:
#   docker compose down
#
# Clean (remove volumes):
#   docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yourtj
      POSTGRES_PASSWORD: yourtj
      POSTGRES_DB: yourtj
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # The API/sqlx migrator owns schema setup. Mounting migrations into initdb
    # would apply them without populating _sqlx_migrations, then replay them at startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourtj"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: dev-master-key
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  meilidata:
