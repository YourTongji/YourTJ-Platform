name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  JWT_SECRET: ci-test-secret
  CREDIT_SYSTEM_PRIVATE_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  PNPM_VERSION: "11.11.0"
  FLUTTER_VERSION: "3.44.6"

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: validate documentation
        run: python3 scripts/check_docs.py
      - name: validate deployment tooling
        run: |
          shellcheck ops/deploy/deploy-main.sh
          python3 -m unittest discover -s ops/deploy/tests
      - name: validate host Nginx configuration
        run: >-
          docker run --rm
          -v "$PWD/ops/deploy/preview-proxy.conf:/etc/nginx/conf.d/yourtj-preview.conf:ro"
          nginx:alpine nginx -t
      - name: validate PR documentation impact
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/check_pr_docs.py

  # ── Backend: quick checks — fmt, clippy, and unit tests (no DB needed) ──
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: format
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings
      - name: unit tests
        run: cargo test --lib

  # ── Backend: integration tests with a real Postgres database ──
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: yourtj
          POSTGRES_PASSWORD: yourtj
          POSTGRES_DB: yourtj_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked
      - name: run migrations
        run: sqlx migrate run --source migrations
        env:
          DATABASE_URL: postgres://yourtj:yourtj@localhost:5432/yourtj_test
          REDIS_URL: redis://localhost:6379
      # --test-threads=1 serialises the integration tests: they share one
      # Postgres database and reset shared tables between cases.
      - name: run integration tests
        run: cargo test --all -- --nocapture --test-threads=1
        env:
          DATABASE_URL: postgres://yourtj:yourtj@localhost:5432/yourtj_test
          REDIS_URL: redis://localhost:6379

  # ── Web: generated types, tests, lint, typecheck, and build ──
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install dependencies
        run: pnpm install --frozen-lockfile
      - name: verify generated API types
        run: |
          pnpm run generate:api
          git diff --exit-code
      - name: tests
        run: pnpm run test:run
      - name: lint
        run: pnpm run lint
      - name: typecheck
        run: pnpm run typecheck
      - name: build
        run: pnpm run build

  # ── Flutter: shared checks and Android build ──
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: install dependencies
        run: |
          flutter pub get --enforce-lockfile
          git diff --exit-code -- pubspec.lock
      - name: verify generated Dart API client
        run: |
          ../scripts/generate_mobile_api.sh
          git diff --exit-code -- packages/yourtj_api
      - name: format
        run: dart format --output=none --set-exit-if-changed lib test
      - name: analyze
        run: flutter analyze --fatal-infos --fatal-warnings
      - name: tests
        run: flutter test
      - name: build Android debug app
        run: flutter build apk --debug
      - name: build Android release app without publication
        run: flutter build apk --release

  # ── Flutter: iOS compile without repository signing credentials ──
  mobile-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [mobile]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: install dependencies
        run: flutter pub get --enforce-lockfile
      - name: build iOS debug app
        run: flutter build ios --debug --no-codesign
      - name: build iOS release app without publication
        run: flutter build ios --release --no-codesign
