name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  JWT_SECRET: ci-test-secret
  CREDIT_SYSTEM_PRIVATE_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  PNPM_VERSION: "11.11.0"

jobs:
  # ── Backend: quick checks — fmt, clippy, and unit tests (no DB needed) ──
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: format
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings
      - name: unit tests
        run: cargo test --lib

  # ── Backend: integration tests with a real Postgres database ──
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: yourtj
          POSTGRES_PASSWORD: yourtj
          POSTGRES_DB: yourtj_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked
      - name: run migrations
        run: sqlx migrate run --source migrations
        env:
          DATABASE_URL: postgres://yourtj:yourtj@localhost:5432/yourtj_test
      # --test-threads=1 serialises the integration tests: they share one
      # Postgres database and reset shared tables between cases.
      - name: run integration tests
        run: cargo test --all -- --nocapture --test-threads=1
        env:
          DATABASE_URL: postgres://yourtj:yourtj@localhost:5432/yourtj_test

  # ── Frontend: lint, typecheck, and build ──
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install dependencies
        run: pnpm install --frozen-lockfile
      - name: verify generated API types
        run: |
          pnpm run generate:api
          git diff --exit-code
      - name: lint
        run: pnpm run lint
      - name: typecheck
        run: pnpm run typecheck
      - name: build
        run: pnpm run build
