name: pr-preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "web/**"
      - "backend/**"
      - "contract/openapi.yaml"
      - ".github/workflows/pr-preview.yml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to deploy"
        required: true

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ── Detect changed paths ──
  changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      preview: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.preview }}
    steps:
      - uses: actions/checkout@v4
      - name: validate PR number
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]] || (( PR_NUMBER > 99 )); then
            echo "invalid or unsupported PR number: $PR_NUMBER" >&2
            exit 64
          fi
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            preview:
              - "backend/**"
              - "web/**"
              - "contract/openapi.yaml"
              - ".github/workflows/pr-preview.yml"

  # ── Build backend Docker image ──
  backend:
    needs: changes
    if: needs.changes.outputs.preview == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: yourtj-api:pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          cache-from: type=gha,scope=backend-pr
          cache-to: type=gha,scope=backend-pr,mode=max
      - run: docker save yourtj-api:pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }} -o /tmp/api-image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: /tmp/api-image.tar
          retention-days: 1

  # ── Build frontend ──
  frontend:
    needs: changes
    if: needs.changes.outputs.preview == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "11.11.0"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: build
        env:
          VITE_API_BASE_URL: /pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}/api/v2
          VITE_BASE_PATH: /pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}/
        run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: web/dist
          retention-days: 1

  # ── Deploy to test server ──
  deploy:
    if: >-
      always() &&
      github.event.action != 'closed' &&
      needs.changes.result == 'success' &&
      needs.backend.result == 'success' &&
      needs.frontend.result == 'success'
    needs: [changes, backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: ./api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: ./frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}

      - name: setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PREVIEW_SSH_KEY }}" > ~/.ssh/preview_key
          chmod 600 ~/.ssh/preview_key
          cat >> ~/.ssh/config << 'EOF'
          Host preview
            HostName ${{ secrets.PREVIEW_HOST }}
            Port ${{ secrets.PREVIEW_PORT }}
            User ${{ secrets.PREVIEW_USER }}
            IdentityFile ~/.ssh/preview_key
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/preview_known_hosts
          EOF

      - name: transfer backend image
        run: |
          ART="api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          TAR="${ART}/api-image.tar"
          test -f "$TAR"
          scp "$TAR" preview:/tmp/api-image-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}.tar
          ssh preview "docker load < /tmp/api-image-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}.tar && rm /tmp/api-image-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}.tar"

      - name: transfer frontend dist
        run: |
          ART="frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          FE_DIR="/opt/yourtj-preview/pr/${{ github.event.pull_request.number || github.event.inputs.pr_number }}/frontend"
          test -f "${ART}/index.html"
          ssh preview "mkdir -p ${FE_DIR} && rm -rf ${FE_DIR}/*"
          scp -r "$ART"/* preview:${FE_DIR}/

      - name: run deploy script
        run: |
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          FE_DIR="/opt/yourtj-preview/pr/${PR}/frontend"
          ssh preview /opt/yourtj-preview/deploy-pr.sh "$PR" "$FE_DIR"

      - name: verify public preview routes
        run: |
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          ssh preview bash -s -- "$PR" <<'EOF'
            PR="$1"
            curl --fail --silent --show-error --retry 60 --retry-delay 1 --retry-connrefused \
              http://127.0.0.1:8080/pr-${PR}/ >/dev/null
            curl --fail --silent --show-error --retry 60 --retry-delay 1 --retry-connrefused \
              http://127.0.0.1:8080/pr-${PR}/api/v2/health >/dev/null
          EOF

      - name: summary
        run: |
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "### :rocket: PR Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | http://${{ secrets.PREVIEW_HOST }}:8080/pr-${PR}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | http://${{ secrets.PREVIEW_HOST }}:8080/pr-${PR}/api/v2/health |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":warning: Preview auto-expires after 24 hours. Re-run this workflow to redeploy." >> $GITHUB_STEP_SUMMARY

  # ── Cleanup on PR close ──
  cleanup:
    # Only clean up when PR is closed without merging (merged → deploy-main handles it)
    if: github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PREVIEW_SSH_KEY }}" > ~/.ssh/preview_key
          chmod 600 ~/.ssh/preview_key
          cat >> ~/.ssh/config << 'EOF'
          Host preview
            HostName ${{ secrets.PREVIEW_HOST }}
            Port ${{ secrets.PREVIEW_PORT }}
            User ${{ secrets.PREVIEW_USER }}
            IdentityFile ~/.ssh/preview_key
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/preview_known_hosts
          EOF

      - name: cleanup
        run: |
          PR="${{ github.event.pull_request.number }}"
          ssh preview "
            docker stop pr-${PR}-fe pr-${PR}-be 2>/dev/null || true
            docker rm pr-${PR}-fe pr-${PR}-be 2>/dev/null || true
            docker rmi yourtj-api:pr-${PR} 2>/dev/null || true
            rm -rf /opt/yourtj-preview/pr/${PR}
            PGPASSWORD=preview_pass_2026 psql -h 127.0.0.1 -p 5433 -U yourtj_preview -d postgres \
              -c \"DROP DATABASE IF EXISTS yourtj_pr_${PR}\" 2>/dev/null || true
          "
          echo "### :broom: PR Preview Cleaned Up" >> $GITHUB_STEP_SUMMARY
