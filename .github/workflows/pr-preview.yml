name: pr-preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "web/**"
      - "backend/**"
      - "contract/openapi.yaml"
      - "ops/deploy/deploy-pr.sh"
      - "ops/deploy/cleanup-pr.sh"
      - "ops/deploy/frontend-nginx.conf.template"
      - ".github/workflows/pr-preview.yml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to deploy"
        required: true

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ── Detect changed paths ──
  changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      preview: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.preview }}
    steps:
      - uses: actions/checkout@v4
      - name: validate PR number
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]{0,2}$ ]]; then
            echo "invalid or unsupported PR number: $PR_NUMBER" >&2
            exit 64
          fi
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            preview:
              - "backend/**"
              - "web/**"
              - "contract/openapi.yaml"
              - "ops/deploy/deploy-pr.sh"
              - "ops/deploy/cleanup-pr.sh"
              - "ops/deploy/frontend-nginx.conf.template"
              - ".github/workflows/pr-preview.yml"

  # ── Build backend Docker image ──
  backend:
    needs: changes
    if: needs.changes.outputs.preview == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: yourtj-api:pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          cache-from: type=gha,scope=backend-pr
          cache-to: type=gha,scope=backend-pr,mode=max
      - run: docker save yourtj-api:pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }} -o /tmp/api-image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: /tmp/api-image.tar
          retention-days: 1

  # ── Build frontend ──
  frontend:
    needs: changes
    if: needs.changes.outputs.preview == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "11.11.0"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: build
        env:
          VITE_API_BASE_URL: /pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}/api/v2
          VITE_BASE_PATH: /pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}/
        run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: web/dist
          retention-days: 1

  # ── Deploy to test server ──
  deploy:
    if: >-
      always() &&
      github.event.action != 'closed' &&
      needs.changes.result == 'success' &&
      needs.backend.result == 'success' &&
      needs.frontend.result == 'success'
    needs: [changes, backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: ./api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: ./frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}

      - name: setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PREVIEW_SSH_KEY }}" > ~/.ssh/preview_key
          chmod 600 ~/.ssh/preview_key
          cat >> ~/.ssh/config << 'EOF'
          Host preview
            HostName ${{ secrets.PREVIEW_HOST }}
            Port ${{ secrets.PREVIEW_PORT }}
            User ${{ secrets.PREVIEW_USER }}
            IdentityFile ~/.ssh/preview_key
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/preview_known_hosts
          EOF

      - name: transfer backend image
        run: |
          ART="api-image-${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          TAR="${ART}/api-image.tar"
          test -f "$TAR"
          scp "$TAR" preview:/tmp/api-image-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}.tar
          ssh preview "docker load < /tmp/api-image-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}.tar && rm /tmp/api-image-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}.tar"

      - name: transfer frontend dist
        run: |
          set -Eeuo pipefail
          ART="frontend-dist-${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          RELEASE="${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          FE_DIR="/opt/yourtj-preview/pr/${PR}/releases/${RELEASE}/frontend"
          transferred=0
          cleanup() {
            if ((transferred == 0)); then
              ssh preview "rm -rf '${FE_DIR}'" || true
            fi
          }
          trap cleanup EXIT
          test -f "${ART}/index.html"
          ssh preview "install -d -m 755 '${FE_DIR}'"
          scp -r "$ART"/* "preview:${FE_DIR}/"
          transferred=1

      - name: run deploy script
        run: |
          set -Eeuo pipefail
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          RELEASE="${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          FE_DIR="/opt/yourtj-preview/pr/${PR}/releases/${RELEASE}/frontend"
          remote_script="/tmp/deploy-pr-${GITHUB_RUN_ID}.sh"
          remote_nginx="/tmp/frontend-nginx-${GITHUB_RUN_ID}.conf.template"
          deployed=0
          cleanup() {
            ssh preview "rm -f '${remote_script}' '${remote_nginx}'" || true
            if ((deployed == 0)); then
              ssh preview "rm -rf '${FE_DIR}'" || true
            fi
          }
          trap cleanup EXIT
          scp ops/deploy/deploy-pr.sh "preview:${remote_script}"
          scp ops/deploy/frontend-nginx.conf.template "preview:${remote_nginx}"
          ssh preview "chmod 700 '${remote_script}' && chmod 600 '${remote_nginx}'"
          ssh preview bash "$remote_script" "$PR" "$FE_DIR" "$GITHUB_SHA" "$remote_nginx"
          deployed=1

      - name: verify public preview routes
        run: |
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          ssh preview bash -s -- "$PR" <<'EOF'
            PR="$1"
            curl --fail --silent --show-error --retry 60 --retry-delay 1 --retry-connrefused \
              http://127.0.0.1:8080/pr-${PR}/ >/dev/null
            curl --fail --silent --show-error --retry 60 --retry-delay 1 --retry-connrefused \
              http://127.0.0.1:8080/pr-${PR}/api/v2/health >/dev/null
            curl --fail --silent --show-error --retry 60 --retry-delay 1 --retry-connrefused \
              http://127.0.0.1:8080/pr-${PR}/api/v2/ready >/dev/null
          EOF

      - name: verify preview container ports are not public
        env:
          PREVIEW_HOST: ${{ secrets.PREVIEW_HOST }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          python3 - "$PREVIEW_HOST" "$PR_NUMBER" <<'PY'
          import socket
          import sys

          host = sys.argv[1]
          pr_number = int(sys.argv[2])
          suffix = f"{pr_number:03d}"
          exposed = []
          for port in (int(f"15{suffix}"), int(f"16{suffix}")):
              try:
                  connection = socket.create_connection((host, port), timeout=2)
              except OSError:
                  continue
              else:
                  connection.close()
                  exposed.append(port)
          if exposed:
              raise SystemExit(f"preview container ports are publicly reachable: {exposed}")
          PY

      - name: summary
        run: |
          PR="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "### :rocket: PR Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | http://${{ secrets.PREVIEW_HOST }}:8080/pr-${PR}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | http://${{ secrets.PREVIEW_HOST }}:8080/pr-${PR}/api/v2/health |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":information_source: Preview remains until the PR close cleanup runs. Re-run this workflow to redeploy." >> $GITHUB_STEP_SUMMARY

  # ── Cleanup on PR close ──
  cleanup:
    # Main deploy and preview cleanup own disjoint resources; merged previews must not leak.
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PREVIEW_SSH_KEY }}" > ~/.ssh/preview_key
          chmod 600 ~/.ssh/preview_key
          cat >> ~/.ssh/config << 'EOF'
          Host preview
            HostName ${{ secrets.PREVIEW_HOST }}
            Port ${{ secrets.PREVIEW_PORT }}
            User ${{ secrets.PREVIEW_USER }}
            IdentityFile ~/.ssh/preview_key
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/preview_known_hosts
          EOF

      - name: cleanup
        run: |
          PR="${{ github.event.pull_request.number }}"
          ssh preview bash -s -- "$PR" < ops/deploy/cleanup-pr.sh
          echo "### :broom: PR Preview Cleaned Up" >> $GITHUB_STEP_SUMMARY
